<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 32 32" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet">
  <!-- Two-frame idle animation grouped inside one SVG. Use two <g> groups: frame1 and frame2. -->
  <defs>
    <style><![CDATA[
      svg { image-rendering: optimizeSpeed; image-rendering: -moz-crisp-edges; image-rendering: -o-crisp-edges; image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges; }
      /* Optional: show only one frame by id switching in CSS or via JS */
    ]]></style>
  </defs>

  <!-- Frame 1: neutral (same as main) -->
  <g id="frame1">
    <rect x="10" y="6" width="8" height="1" fill="#000" />
    <rect x="9" y="7" width="10" height="1" fill="#000" />
    <rect x="9" y="8" width="2" height="1" fill="#000" />
    <rect x="19" y="8" width="2" height="1" fill="#000" />
    <rect x="10" y="9" width="8" height="1" fill="#000" />

    <rect x="11" y="10" width="6" height="1" fill="#000" />
    <rect x="10" y="11" width="8" height="1" fill="#000" />
    <rect x="10" y="12" width="2" height="6" fill="#000" />
    <rect x="18" y="12" width="2" height="6" fill="#000" />
    <rect x="11" y="18" width="6" height="1" fill="#000" />

    <rect x="7" y="11" width="3" height="6" fill="#000" />
    <rect x="6" y="12" width="1" height="4" fill="#000" />
    <rect x="21" y="11" width="3" height="6" fill="#000" />
    <rect x="24" y="9" width="1" height="4" fill="#000" />

    <rect x="12" y="19" width="1" height="3" fill="#000" />
    <rect x="16" y="19" width="1" height="3" fill="#000" />

    <rect x="11" y="6" width="8" height="1" fill="#6b8ba4" />
    <rect x="10" y="7" width="10" height="1" fill="#6b8ba4" />
    <rect x="10" y="9" width="8" height="1" fill="#6b8ba4" />
    <rect x="11" y="10" width="6" height="1" fill="#8aa6b4" />
    <rect x="10" y="11" width="8" height="1" fill="#8aa6b4" />
    <rect x="11" y="12" width="6" height="6" fill="#6b8ba4" />

    <rect x="12" y="13" width="4" height="3" fill="#8b3a3a" />

    <rect x="6" y="13" width="3" height="3" fill="#d4a017" />
    <rect x="6" y="12" width="3" height="1" fill="#b8860b" />

    <rect x="24" y="9" width="1" height="3" fill="#cfd8dc" />
    <rect x="23" y="11" width="1" height="1" fill="#6b4a2a" />
    <rect x="24" y="12" width="1" height="1" fill="#6b4a2a" />
    <rect x="23" y="9" width="1" height="1" fill="#cfd8dc" />

    <rect x="12" y="8" width="2" height="1" fill="#f1c27d" />
    <rect x="15" y="8" width="2" height="1" fill="#f1c27d" />

    <rect x="13" y="8" width="1" height="1" fill="#000" />
    <rect x="16" y="8" width="1" height="1" fill="#000" />

    <rect x="11" y="19" width="3" height="3" fill="#3b3b3b" />
    <rect x="14" y="19" width="3" height="3" fill="#3b3b3b" />

    <rect x="12" y="22" width="1" height="1" fill="#000" />
    <rect x="16" y="22" width="1" height="1" fill="#000" />

    <rect x="11" y="11" width="1" height="1" fill="#56707a" />
    <rect x="17" y="11" width="1" height="1" fill="#56707a" />
    <rect x="12" y="14" width="4" height="1" fill="#5a2f2f" />
  </g>

  <!-- Frame 2: idle - slight movement: raise shield & sword, blink (eye off) -->
  <g id="frame2">
    <!-- Helmet/head -->
    <rect x="10" y="6" width="8" height="1" fill="#000" />
    <rect x="9" y="7" width="10" height="1" fill="#000" />
    <rect x="9" y="8" width="2" height="1" fill="#000" />
    <rect x="19" y="8" width="2" height="1" fill="#000" />
    <rect x="10" y="9" width="8" height="1" fill="#000" />

    <!-- body outline -->
    <rect x="11" y="10" width="6" height="1" fill="#000" />
    <rect x="10" y="11" width="8" height="1" fill="#000" />
    <rect x="10" y="12" width="2" height="6" fill="#000" />
    <rect x="18" y="12" width="2" height="6" fill="#000" />
    <rect x="11" y="18" width="6" height="1" fill="#000" />

    <!-- left arm shield raised one pixel -->
    <rect x="7" y="10" width="3" height="6" fill="#000" />
    <rect x="6" y="11" width="1" height="4" fill="#000" />
    <!-- right arm sword raised one pixel -->
    <rect x="21" y="10" width="3" height="6" fill="#000" />
    <rect x="24" y="8" width="1" height="4" fill="#000" />

    <!-- legs -->
    <rect x="12" y="19" width="1" height="3" fill="#000" />
    <rect x="16" y="19" width="1" height="3" fill="#000" />

    <!-- fills -->
    <rect x="11" y="6" width="8" height="1" fill="#6b8ba4" />
    <rect x="10" y="7" width="10" height="1" fill="#6b8ba4" />
    <rect x="10" y="9" width="8" height="1" fill="#6b8ba4" />
    <rect x="11" y="10" width="6" height="1" fill="#8aa6b4" />
    <rect x="10" y="11" width="8" height="1" fill="#8aa6b4" />
    <rect x="11" y="12" width="6" height="6" fill="#6b8ba4" />

    <rect x="12" y="13" width="4" height="3" fill="#8b3a3a" />

    <!-- shield moved up -->
    <rect x="6" y="12" width="3" height="3" fill="#d4a017" />
    <rect x="6" y="11" width="3" height="1" fill="#b8860b" />

    <!-- sword moved up -->
    <rect x="24" y="8" width="1" height="3" fill="#cfd8dc" />
    <rect x="23" y="10" width="1" height="1" fill="#6b4a2a" />
    <rect x="24" y="11" width="1" height="1" fill="#6b4a2a" />
    <rect x="23" y="8" width="1" height="1" fill="#cfd8dc" />

    <!-- skin with blink: eyes off (no black pixels) -->
    <rect x="12" y="8" width="2" height="1" fill="#f1c27d" />
    <rect x="15" y="8" width="2" height="1" fill="#f1c27d" />

    <!-- legs/boots -->
    <rect x="11" y="19" width="3" height="3" fill="#3b3b3b" />
    <rect x="14" y="19" width="3" height="3" fill="#3b3b3b" />
    <rect x="12" y="22" width="1" height="1" fill="#000" />
    <rect x="16" y="22" width="1" height="1" fill="#000" />

    <!-- accents -->
    <rect x="11" y="11" width="1" height="1" fill="#56707a" />
    <rect x="17" y="11" width="1" height="1" fill="#56707a" />
    <rect x="12" y="14" width="4" height="1" fill="#5a2f2f" />
  </g>

  <!-- Note: To animate, toggle visibility of #frame1 and #frame2 via CSS animation or JS. -->
</svg>