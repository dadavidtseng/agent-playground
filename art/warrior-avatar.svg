<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="128" height="128" viewBox="0 0 128 128" aria-labelledby="title desc" role="img">
  <title id="title">Warrior Avatar Suite</title>
  <desc id="desc">Two avatar variants in one SVG: a large stylized avatar with gradients and a pixel-art 16x16 warrior with 3-frame idle animation. CSS variables available for tinting the pixel avatar.</desc>

  <defs>
    <!-- CSS variables and utility classes for the pixel art (can be overridden) -->
    <style type="text/css"><![CDATA[
      :root{
        --outline-color: #111111;
        --helm-color: #555a86;
        --plume-color: #d9534f;
        --armor-color: #7f8fb0;
        --metal-color: #bfc8d6;
        --skin-color: #f1c27d;
        --shadow-color: #3b4056;
      }
      .outline { display:inline }
      .color { display:inline }
    ]]></style>

    <!-- gradients from the large avatar -->
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0%" stop-color="#ffd27f"/>
      <stop offset="100%" stop-color="#ff9a5a"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="1">
      <stop offset="0%" stop-color="#c7f0ff"/>
      <stop offset="100%" stop-color="#7fcfff"/>
    </linearGradient>
  </defs>

  <!-- Large stylized avatar (original agent-playground-programmer side) -->
  <rect width="128" height="128" rx="16" fill="#222"/>
  <g transform="translate(12,12)">
    <circle cx="52" cy="28" r="22" fill="url(#g1)" stroke="#333" stroke-width="2"/>
    <rect x="20" y="58" width="64" height="44" rx="8" fill="url(#g2)" stroke="#333" stroke-width="2"/>
    <path d="M38 30c4 6 12 6 16 0" fill="none" stroke="#6b3b20" stroke-width="4" stroke-linecap="round"/>
    <circle cx="44" cy="24" r="3" fill="#333"/>
    <circle cx="60" cy="24" r="3" fill="#333"/>
    <path d="M18 84c8-6 28-6 46 0" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Pixel-art warrior (original HEAD side) embedded and scaled down -->
  <!-- Placed at top-right corner (scaled to fit a 32x32 box). This preserves all pixel rects, layers and animation. -->
  <g id="pixel-art" transform="translate(72,8) scale(4)" shape-rendering="crispEdges" aria-hidden="false">
    <!-- FRAME 0 (neutral) -->
    <g id="frame0" opacity="1">
      <!-- outline layer (monochrome) -->
      <g class="outline" fill="var(--outline-color)">
        <rect x="7" y="0" width="1" height="1" />
        <rect x="8" y="0" width="1" height="1" />
        <rect x="5" y="1" width="6" height="1" />
        <rect x="4" y="2" width="8" height="1" />
        <rect x="4" y="3" width="8" height="1" />
        <rect x="5" y="4" width="6" height="1" />
        <rect x="5" y="5" width="6" height="1" />
        <rect x="5" y="6" width="6" height="6" />
        <rect x="11" y="6" width="1" height="3" />
        <rect x="11" y="5" width="1" height="1" />
        <rect x="3" y="7" width="1" height="3" />
        <rect x="2" y="8" width="1" height="1" />
      </g>

      <!-- colored layer -->
      <g class="color">
        <rect x="7" y="0" width="1" height="1" fill="var(--plume-color)" />
        <rect x="8" y="0" width="1" height="1" fill="var(--plume-color)" />

        <rect x="5" y="1" width="6" height="1" fill="var(--helm-color)" />
        <rect x="4" y="2" width="8" height="1" fill="var(--helm-color)" />
        <rect x="4" y="3" width="8" height="1" fill="var(--helm-color)" />

        <rect x="6" y="4" width="1" height="1" fill="var(--skin-color)" />
        <rect x="7" y="4" width="2" height="1" fill="var(--skin-color)" />
        <rect x="9" y="4" width="1" height="1" fill="var(--skin-color)" />
        <rect x="6" y="5" width="4" height="1" fill="var(--skin-color)" />

        <rect x="6" y="4" width="1" height="1" fill="var(--shadow-color)" opacity="0.6" />
        <rect x="9" y="4" width="1" height="1" fill="var(--shadow-color)" opacity="0.6" />

        <rect x="5" y="6" width="6" height="2" fill="var(--armor-color)" />
        <rect x="5" y="8" width="6" height="2" fill="var(--armor-color)" />
        <rect x="5" y="10" width="6" height="2" fill="var(--armor-color)" />
        <rect x="6" y="9" width="4" height="1" fill="var(--plume-color)" />

        <rect x="11" y="5" width="1" height="1" fill="var(--metal-color)" />
        <rect x="11" y="6" width="1" height="3" fill="var(--metal-color)" />

        <rect x="3" y="7" width="1" height="3" fill="var(--metal-color)" />
        <rect x="2" y="8" width="1" height="1" fill="var(--metal-color)" />

        <rect x="5" y="8" width="1" height="1" fill="var(--shadow-color)" opacity="0.25" />
        <rect x="10" y="8" width="1" height="1" fill="var(--shadow-color)" opacity="0.25" />
      </g>
    </g>

    <!-- FRAME 1 (slightly inhaled - move body up 0.25) -->
    <g id="frame1" opacity="0">
      <g class="outline" fill="var(--outline-color)" transform="translate(0,-0.25)">
        <rect x="7" y="0" width="1" height="1" />
        <rect x="8" y="0" width="1" height="1" />
        <rect x="5" y="1" width="6" height="1" />
        <rect x="4" y="2" width="8" height="1" />
        <rect x="4" y="3" width="8" height="1" />
        <rect x="5" y="4" width="6" height="1" />
        <rect x="5" y="5" width="6" height="1" />
        <rect x="5" y="6" width="6" height="6" />
        <rect x="11" y="6" width="1" height="3" />
        <rect x="11" y="5" width="1" height="1" />
        <rect x="3" y="7" width="1" height="3" />
        <rect x="2" y="8" width="1" height="1" />
      </g>

      <g class="color" transform="translate(0,-0.25)">
        <rect x="7" y="0" width="1" height="1" fill="var(--plume-color)" />
        <rect x="8" y="0" width="1" height="1" fill="var(--plume-color)" />
        <rect x="5" y="1" width="6" height="1" fill="var(--helm-color)" />
        <rect x="4" y="2" width="8" height="1" fill="var(--helm-color)" />
        <rect x="4" y="3" width="8" height="1" fill="var(--helm-color)" />
        <rect x="6" y="4" width="1" height="1" fill="var(--skin-color)" />
        <rect x="7" y="4" width="2" height="1" fill="var(--skin-color)" />
        <rect x="9" y="4" width="1" height="1" fill="var(--skin-color)" />
        <rect x="6" y="5" width="4" height="1" fill="var(--skin-color)" />
        <rect x="6" y="4" width="1" height="1" fill="var(--shadow-color)" opacity="0.6" />
        <rect x="9" y="4" width="1" height="1" fill="var(--shadow-color)" opacity="0.6" />

        <rect x="5" y="6" width="6" height="2" fill="var(--armor-color)" />
        <rect x="5" y="8" width="6" height="2" fill="var(--armor-color)" />
        <rect x="5" y="10" width="6" height="2" fill="var(--armor-color)" />
        <rect x="6" y="9" width="4" height="1" fill="var(--plume-color)" />

        <rect x="11" y="5" width="1" height="1" fill="var(--metal-color)" />
        <rect x="11" y="6" width="1" height="3" fill="var(--metal-color)" />
        <rect x="3" y="7" width="1" height="3" fill="var(--metal-color)" />
        <rect x="2" y="8" width="1" height="1" fill="var(--metal-color)" />
        <rect x="5" y="8" width="1" height="1" fill="var(--shadow-color)" opacity="0.25" />
        <rect x="10" y="8" width="1" height="1" fill="var(--shadow-color)" opacity="0.25" />
      </g>
    </g>

    <!-- FRAME 2 (slightly exhaled - move body down 0.35) -->
    <g id="frame2" opacity="0">
      <g class="outline" fill="var(--outline-color)" transform="translate(0,0.35)">
        <rect x="7" y="0" width="1" height="1" />
        <rect x="8" y="0" width="1" height="1" />
        <rect x="5" y="1" width="6" height="1" />
        <rect x="4" y="2" width="8" height="1" />
        <rect x="4" y="3" width="8" height="1" />
        <rect x="5" y="4" width="6" height="1" />
        <rect x="5" y="5" width="6" height="1" />
        <rect x="5" y="6" width="6" height="6" />
        <rect x="11" y="6" width="1" height="3" />
        <rect x="11" y="5" width="1" height="1" />
        <rect x="3" y="7" width="1" height="3" />
        <rect x="2" y="8" width="1" height="1" />
      </g>

      <g class="color" transform="translate(0,0.35)">
        <rect x="7" y="0" width="1" height="1" fill="var(--plume-color)" />
        <rect x="8" y="0" width="1" height="1" fill="var(--plume-color)" />
        <rect x="5" y="1" width="6" height="1" fill="var(--helm-color)" />
        <rect x="4" y="2" width="8" height="1" fill="var(--helm-color)" />
        <rect x="4" y="3" width="8" height="1" fill="var(--helm-color)" />
        <rect x="6" y="4" width="1" height="1" fill="var(--skin-color)" />
        <rect x="7" y="4" width="2" height="1" fill="var(--skin-color)" />
        <rect x="9" y="4" width="1" height="1" fill="var(--skin-color)" />
        <rect x="6" y="5" width="4" height="1" fill="var(--skin-color)" />
        <rect x="6" y="4" width="1" height="1" fill="var(--shadow-color)" opacity="0.6" />
        <rect x="9" y="4" width="1" height="1" fill="var(--shadow-color)" opacity="0.6" />

        <rect x="5" y="6" width="6" height="2" fill="var(--armor-color)" />
        <rect x="5" y="8" width="6" height="2" fill="var(--armor-color)" />
        <rect x="5" y="10" width="6" height="2" fill="var(--armor-color)" />
        <rect x="6" y="9" width="4" height="1" fill="var(--plume-color)" />

        <rect x="11" y="5" width="1" height="1" fill="var(--metal-color)" />
        <rect x="11" y="6" width="1" height="3" fill="var(--metal-color)" />
        <rect x="3" y="7" width="1" height="3" fill="var(--metal-color)" />
        <rect x="2" y="8" width="1" height="1" fill="var(--metal-color)" />
        <rect x="5" y="8" width="1" height="1" fill="var(--shadow-color)" opacity="0.25" />
        <rect x="10" y="8" width="1" height="1" fill="var(--shadow-color)" opacity="0.25" />
      </g>
    </g>

    <!-- Opacity animations for the three frames (cycle through frames) -->
    <g>
      <animate xlink:href="#frame0" attributeName="opacity" values="1;0;0;1" keyTimes="0;0.333;0.666;1" dur="1.2s" repeatCount="indefinite" />
      <animate xlink:href="#frame1" attributeName="opacity" values="0;1;0;0" keyTimes="0;0.333;0.666;1" dur="1.2s" repeatCount="indefinite" />
      <animate xlink:href="#frame2" attributeName="opacity" values="0;0;1;0" keyTimes="0;0.333;0.666;1" dur="1.2s" repeatCount="indefinite" />
    </g>
  </g>
</svg>