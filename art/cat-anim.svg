<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 32 32" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Pixel cat — 2-frame animation</title>
  <desc id="desc">Two-frame inline animation toggling the right ear and tail to create a blink/wag effect.</desc>

  <style>:root{ --color-cat-main: #b0b0b0; --color-ear: #f4a6c0; --color-eye:#2c9; --color-nose:#f07; --color-dark:#222;}svg{display:block}</style>

  <!-- Frame 1 group -->
  <g id="frame1">
    <rect x="10" y="14" width="12" height="8" fill="var(--color-cat-main)"/>
    <rect x="8" y="8" width="16" height="10" fill="var(--color-cat-main)"/>
    <rect x="6" y="6" width="4" height="4" fill="var(--color-cat-main)"/>
    <rect x="22" y="6" width="4" height="4" fill="var(--color-cat-main)"/>
    <rect x="7" y="7" width="2" height="2" fill="var(--color-ear)"/>
    <rect x="24" y="7" width="2" height="2" fill="var(--color-ear)"/>
    <rect x="20" y="18" width="6" height="2" fill="var(--color-cat-main)"/>
    <rect x="22" y="16" width="2" height="2" fill="var(--color-cat-main)"/>
    <rect x="12" y="12" width="2" height="2" fill="var(--color-eye)"/>
    <rect x="18" y="12" width="2" height="2" fill="var(--color-eye)"/>
    <rect x="15" y="14" width="2" height="1" fill="var(--color-nose)"/>
  </g>

  <!-- Frame 2 group: ear down + tail up (simple variant) -->
  <g id="frame2" opacity="0">
    <rect x="10" y="14" width="12" height="8" fill="var(--color-cat-main)"/>
    <rect x="8" y="8" width="16" height="10" fill="var(--color-cat-main)"/>
    <!-- Left ear stays -->
    <rect x="6" y="6" width="4" height="4" fill="var(--color-cat-main)"/>
    <rect x="7" y="7" width="2" height="2" fill="var(--color-ear)"/>
    <!-- Right ear lowered -->
    <rect x="22" y="8" width="4" height="2" fill="var(--color-cat-main)"/>
    <rect x="23" y="8" width="2" height="1" fill="var(--color-ear)"/>
    <!-- Tail raised a bit -->
    <rect x="20" y="16" width="2" height="2" fill="var(--color-cat-main)"/>
    <rect x="22" y="14" width="2" height="2" fill="var(--color-cat-main)"/>
    <rect x="12" y="12" width="2" height="2" fill="var(--color-eye)"/>
    <rect x="18" y="12" width="2" height="2" fill="var(--color-eye)"/>
    <rect x="15" y="14" width="2" height="1" fill="var(--color-nose)"/>
  </g>

  <!-- Animation: toggle opacity between frame1 and frame2 -->
  <animate xlink:href="#frame1" attributeName="opacity" values="1;0;1" dur="800ms" repeatCount="indefinite"/>
  <animate xlink:href="#frame2" attributeName="opacity" values="0;1;0" dur="800ms" repeatCount="indefinite"/>

</svg>