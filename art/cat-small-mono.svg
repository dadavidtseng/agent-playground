<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 32 32" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Pixel cat — small (monochrome)</title>
  <desc id="desc">A 32x32 pixel-art cat in monochrome. Scales crisply to 48x48.</desc>
  <style>:root{ --cat: var(--color-foreground, #222);}svg{display:block}</style>

  <rect x="10" y="14" width="12" height="8" fill="var(--cat)"/>
  <rect x="8" y="8" width="16" height="10" fill="var(--cat)"/>
  <rect x="6" y="6" width="4" height="4" fill="var(--cat)"/>
  <rect x="22" y="6" width="4" height="4" fill="var(--cat)"/>
  <rect x="20" y="18" width="6" height="2" fill="var(--cat)"/>
  <rect x="22" y="16" width="2" height="2" fill="var(--cat)"/>
  <rect x="12" y="12" width="2" height="2" fill="#fff"/>
  <rect x="18" y="12" width="2" height="2" fill="#fff"/>
  <rect x="15" y="14" width="2" height="1" fill="#fff"/>
</svg>