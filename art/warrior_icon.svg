<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Pixel-art warrior icon (64x64)">
  <!-- Pixel-art grid: 8x8 cells, cell size = 8 -->
  <!-- Simplified icon version of the portrait. Groups and IDs/classes kept for styling/animation -->

  <!-- Cloak/back -->
  <g id="layer_cloak" class="cloak">
    <rect x="12" y="24" width="8" height="8" fill="#7a1730" />
    <rect x="4" y="32" width="8" height="8" fill="#7a1730" />
    <rect x="12" y="32" width="8" height="8" fill="#7a1730" />
  </g>

  <!-- Armor -->
  <g id="layer_armor" class="armor">
    <rect x="24" y="0" width="8" height="8" fill="#4b6b8a" />
    <rect x="32" y="0" width="8" height="8" fill="#4b6b8a" />
    <rect x="16" y="8" width="8" height="8" fill="#4b6b8a" />
    <rect x="24" y="8" width="8" height="8" fill="#4b6b8a" />
    <rect x="32" y="8" width="8" height="8" fill="#4b6b8a" />
    <rect x="40" y="8" width="8" height="8" fill="#4b6b8a" />
    <rect x="16" y="16" width="8" height="8" fill="#4b6b8a" />
    <rect x="40" y="16" width="8" height="8" fill="#4b6b8a" />
  </g>

  <!-- Head -->
  <g id="head">
    <g id="layer_skin" class="skin">
      <rect x="24" y="8" width="8" height="8" fill="#f1c27d" />
      <rect x="32" y="8" width="8" height="8" fill="#f1c27d" />
      <rect x="24" y="16" width="8" height="8" fill="#f1c27d" />
      <rect x="40" y="16" width="8" height="8" fill="#f1c27d" />
    </g>
    <g id="layer_eyes" class="eyes">
      <rect x="28" y="12" width="4" height="4" fill="#000" />
      <rect x="36" y="12" width="4" height="4" fill="#000" />
    </g>
  </g>

  <!-- Weapon -->
  <g id="sword" class="weapon">
    <rect x="48" y="8" width="8" height="8" fill="#cfd8dc" />
    <rect x="48" y="16" width="8" height="8" fill="#cfd8dc" />
    <rect x="56" y="16" width="8" height="8" fill="#cfd8dc" />
    <rect x="48" y="24" width="8" height="8" fill="#cfd8dc" />
    <rect x="56" y="8" width="8" height="8" fill="#5b3a29" />
  </g>

  <!-- Lower body -->
  <g id="layer_lower" class="lower">
    <rect x="24" y="24" width="8" height="8" fill="#4b6b8a" />
    <rect x="32" y="24" width="8" height="8" fill="#4b6b8a" />
    <rect x="24" y="36" width="8" height="8" fill="#2b1b0f" />
    <rect x="40" y="36" width="8" height="8" fill="#2b1b0f" />
  </g>

</svg>
