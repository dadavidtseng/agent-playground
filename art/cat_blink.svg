<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" shape-rendering="crispEdges" aria-labelledby="title desc">
  <title id="title">Pixel Cat - Blink</title>
  <desc id="desc">Pixel-art cat with a simple blink animation using SMIL. IDs/classes included for targeting.</desc>

  <defs>
    <style><![CDATA[
      .cat-body { fill: #FFD07A; }
      .cat-stripe { fill: #E79A3C; }
      .cat-ear-inner { fill: #FFC9A0; }
      .cat-eye { fill: #FFFFFF; }
      .cat-pupil { fill: #000000; }
      .cat-nose { fill: #E86B73; }
      .cat-outline { fill: none; stroke: #000000; stroke-width: 1; }
      .cat-eyelid { fill: #FFD07A; }
    ]]></style>
  </defs>

  <!-- Static parts identical to idle -->
  <g id="cat-base">
    <g id="cat-ears" class="cat-ears">
      <rect class="cat-body" id="cat-ear-left-1" x="32" y="12" width="12" height="12" />
      <rect class="cat-ear-inner" id="cat-ear-left-inner" x="36" y="16" width="4" height="4" />
      <rect class="cat-body" id="cat-ear-right-1" x="84" y="12" width="12" height="12" />
      <rect class="cat-ear-inner" id="cat-ear-right-inner" x="88" y="16" width="4" height="4" />
    </g>

    <g id="cat-head" class="cat-body">
      <rect x="28" y="24" width="72" height="8" />
      <rect x="24" y="32" width="80" height="8" />
      <rect x="24" y="40" width="80" height="8" />
      <rect x="24" y="48" width="80" height="8" />
      <rect x="28" y="56" width="72" height="8" />
    </g>

    <g id="cat-stripes" class="cat-stripe">
      <rect x="40" y="32" width="8" height="4" />
      <rect x="84" y="32" width="8" height="4" />
      <rect x="56" y="44" width="16" height="4" />
    </g>

    <g id="cat-body-group">
      <rect class="cat-body" id="cat-torso" x="36" y="72" width="56" height="28" />
      <rect class="cat-stripe" id="cat-tail" x="24" y="76" width="12" height="8" rx="1" />
    </g>

    <g id="cat-outline" class="cat-outline">
      <rect x="24" y="24" width="80" height="56" fill="none" />
      <rect x="36" y="72" width="56" height="28" fill="none" />
      <rect x="24" y="76" width="12" height="8" fill="none" />
    </g>
  </g>

  <!-- Face with animation for blink -->
  <g id="cat-face">
    <!-- Eyes open group -->
    <g id="eyes-open">
      <g id="cat-eye-left" class="cat-eye">
        <rect x="48" y="44" width="8" height="8" />
        <rect id="cat-pupil-left" class="cat-pupil" x="50" y="46" width="4" height="4" >
          <!-- pupil opacity will be animated to 0 when blinking -->
          <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.7;0.75;0.85;1" dur="3s" repeatCount="indefinite" />
        </rect>
      </g>
      <g id="cat-eye-right" class="cat-eye">
        <rect x="72" y="44" width="8" height="8" />
        <rect id="cat-pupil-right" class="cat-pupil" x="74" y="46" width="4" height="4" >
          <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.7;0.75;0.85;1" dur="3s" repeatCount="indefinite" />
        </rect>
      </g>
    </g>

    <!-- Eyelids that appear during blink -->
    <g id="eyelids" class="cat-eyelid">
      <rect id="cat-eyelid-left" class="cat-eyelid" x="48" y="46" width="8" height="4" opacity="0">
        <!-- eyelid shows briefly to cover eye -->
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.7;0.75;0.85;1" dur="3s" repeatCount="indefinite" />
      </rect>
      <rect id="cat-eyelid-right" class="cat-eyelid" x="72" y="46" width="8" height="4" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.7;0.75;0.85;1" dur="3s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- Nose and mouth static -->
    <rect id="cat-nose" class="cat-nose" x="62" y="56" width="4" height="4" />
    <rect id="cat-mouth-left" class="cat-pupil" x="58" y="60" width="3" height="2" />
    <rect id="cat-mouth-right" class="cat-pupil" x="67" y="60" width="3" height="2" />
  </g>

</svg>