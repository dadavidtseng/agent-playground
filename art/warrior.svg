<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 20" width="128" height="160" role="img" aria-labelledby="title desc" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet">
  <title id="title">Pixel warrior</title>
  <desc id="desc">A small pixel-art warrior sprite. Designed to scale cleanly at integer multiples.</desc>
  <!-- Palette: #000000 (black), #A0A0A0 (helmet dark), #C8C8C8 (helmet light), #F2C9A1 (skin), #2A6FB0 (tunic), #5A3B1B (boots), #886433 (belt), #E0B000 (gold) -->

  <!-- Helmet top band -->
  <rect x="4" y="0" width="8" height="1" fill="#A0A0A0"/>
  <!-- Helmet body (slightly wider) -->
  <rect x="3" y="1" width="10" height="2" fill="#C8C8C8"/>
  <!-- Helmet lower rim -->
  <rect x="4" y="3" width="8" height="1" fill="#A0A0A0"/>

  <!-- Face / visor -->
  <rect x="5" y="4" width="6" height="4" fill="#F2C9A1"/>
  <!-- Eyes -->
  <rect x="6" y="5" width="1" height="1" fill="#000000"/>
  <rect x="9" y="5" width="1" height="1" fill="#000000"/>
  <!-- Chin shadow -->
  <rect x="7" y="7" width="2" height="1" fill="#E0B000" fill-opacity="0.12"/>

  <!-- Armor / tunic -->
  <rect x="3" y="8" width="10" height="4" fill="#2A6FB0"/>
  <!-- Belt -->
  <rect x="3" y="11" width="10" height="1" fill="#886433"/>

  <!-- Left arm (holding nothing) -->
  <rect x="1" y="8" width="2" height="4" fill="#2A6FB0"/>
  <!-- Right arm (holding sword) -->
  <rect x="13" y="8" width="2" height="4" fill="#2A6FB0"/>

  <!-- Sword blade (vertical) -->
  <rect x="13" y="4" width="1" height="4" fill="#888888"/>
  <!-- Sword guard -->
  <rect x="12" y="7" width="3" height="1" fill="#E0B000"/>
  <!-- Sword pommel -->
  <rect x="13" y="3" width="1" height="1" fill="#E0B000"/>

  <!-- Legs -->
  <rect x="5" y="12" width="2" height="4" fill="#5A3B1B"/>
  <rect x="9" y="12" width="2" height="4" fill="#5A3B1B"/>
  <!-- Boots (darker) -->
  <rect x="5" y="16" width="2" height="1" fill="#3A2A16"/>
  <rect x="9" y="16" width="2" height="1" fill="#3A2A16"/>

  <!-- Simple black outline accents (pixel-style) -->
  <rect x="4" y="1" width="1" height="1" fill="#000000"/>
  <rect x="11" y="1" width="1" height="1" fill="#000000"/>
  <rect x="4" y="3" width="1" height="1" fill="#000000"/>
  <rect x="11" y="3" width="1" height="1" fill="#000000"/>
  <rect x="3" y="8" width="1" height="1" fill="#000000"/>
  <rect x="12" y="8" width="1" height="1" fill="#000000"/>
  <rect x="6" y="12" width="1" height="1" fill="#000000"/>
  <rect x="9" y="12" width="1" height="1" fill="#000000"/>

  <!-- Make sure pixels remain sharp when scaled -->
  <style> svg { image-rendering: pixelated; } </style>
</svg>
