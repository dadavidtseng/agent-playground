<?xml version="1.0" encoding="UTF-8"?>
<!-- Sprite sheet combining idle, attack, portrait in a 48x16 grid (3 frames horizontally). viewBox uses integer coords. -->
<svg xmlns="http://www.w3.org/2000/svg" width="288" height="96" viewBox="0 0 48 16" shape-rendering="crispEdges" aria-labelledby="title desc">
  <metadata>Author: KĀDI Artist Agent; License: CC0 1.0 Universal</metadata>
  <title id="title">Warrior Sprite Sheet</title>
  <desc id="desc">Combined sprite sheet: idle (x0), attack (x16), portrait (x32). Each frame 16x16 grid. CC0 license.</desc>
  <!-- Idle at x=0..15 -->
  <g id="idle" transform="translate(0,0)">
    <rect x="5" y="1" width="6" height="1" fill="#2B2B2B"/>
    <rect x="4" y="2" width="8" height="1" fill="#2B2B2B"/>
    <rect x="5" y="3" width="6" height="2" fill="#F1C27D"/>
    <rect x="6" y="4" width="1" height="1" fill="#000"/>
    <rect x="9" y="4" width="1" height="1" fill="#000"/>
    <rect x="7" y="5" width="2" height="1" fill="#F1C27D"/>
    <rect x="4" y="6" width="8" height="3" fill="#6B8AA2"/>
    <rect x="4" y="9" width="8" height="1" fill="#8B3E2F"/>
    <rect x="5" y="10" width="2" height="3" fill="#4A4A4A"/>
    <rect x="9" y="10" width="2" height="3" fill="#4A4A4A"/>
    <rect x="5" y="13" width="2" height="1" fill="#000"/>
    <rect x="9" y="13" width="2" height="1" fill="#000"/>
    <rect x="12" y="6" width="1" height="3" fill="#6B8AA2"/>
    <rect x="13" y="6" width="1" height="1" fill="#6B8AA2"/>
    <rect x="14" y="7" width="1" height="4" fill="#704214"/>
    <rect x="15" y="8" width="1" height="2" fill="#CFCFCF"/>
  </g>
  <!-- Attack at x=16..31 -->
  <g id="attack" transform="translate(16,0)">
    <rect x="5" y="1" width="6" height="1" fill="#2B2B2B"/>
    <rect x="4" y="2" width="8" height="1" fill="#2B2B2B"/>
    <rect x="5" y="3" width="6" height="2" fill="#F1C27D"/>
    <rect x="6" y="4" width="1" height="1" fill="#000"/>
    <rect x="9" y="4" width="1" height="1" fill="#000"/>
    <rect x="7" y="5" width="2" height="1" fill="#F1C27D"/>
    <rect x="5" y="6" width="6" height="3" fill="#6B8AA2"/>
    <rect x="11" y="7" width="1" height="1" fill="#6B8AA2"/>
    <rect x="5" y="9" width="6" height="1" fill="#8B3E2F"/>
    <rect x="6" y="10" width="2" height="3" fill="#4A4A4A"/>
    <rect x="9" y="10" width="2" height="3" fill="#4A4A4A"/>
    <rect x="6" y="13" width="2" height="1" fill="#000"/>
    <rect x="9" y="13" width="2" height="1" fill="#000"/>
    <rect x="2" y="6" width="2" height="1" fill="#6B8AA2"/>
    <rect x="1" y="7" width="1" height="2" fill="#6B8AA2"/>
    <rect x="0" y="8" width="1" height="1" fill="#704214"/>
    <rect x="1" y="9" width="10" height="1" fill="#CFCFCF"/>
  </g>
  <!-- Portrait at x=32..47 -->
  <g id="portrait" transform="translate(32,0)">
    <rect x="5" y="0" width="6" height="1" fill="#2B2B2B"/>
    <rect x="4" y="1" width="8" height="1" fill="#2B2B2B"/>
    <rect x="5" y="2" width="6" height="3" fill="#F1C27D"/>
    <rect x="6" y="3" width="1" height="1" fill="#000"/>
    <rect x="9" y="3" width="1" height="1" fill="#000"/>
    <rect x="8" y="5" width="1" height="1" fill="#000"/>
    <rect x="3" y="6" width="10" height="4" fill="#6B8AA2"/>
    <rect x="3" y="6" width="1" height="4" fill="#000"/>
    <rect x="12" y="6" width="1" height="4" fill="#000"/>
  </g>
</svg>