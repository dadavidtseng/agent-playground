<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 32 32" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Pixel cat — large (full color)</title>
  <desc id="desc">A 32x32 pixel-art cat, full-color variant. Scales crisply to 192x192.</desc>
  <style>
    :root{ --color-cat-main: var(--color-foreground, #b0b0b0); --color-cat-dark: var(--color-foreground-contrast, #222); --color-ear: var(--color-accent, #f4a6c0); --color-eye: var(--color-primary, #2c9); --color-nose: #f07; }
    svg{display:block}
  </style>

  <!-- Body and head -->
  <rect x="10" y="14" width="12" height="8" fill="var(--color-cat-main)"/>
  <rect x="8" y="8" width="16" height="10" fill="var(--color-cat-main)"/>

  <!-- Ears -->
  <rect x="6" y="6" width="4" height="4" fill="var(--color-cat-main)"/>
  <rect x="22" y="6" width="4" height="4" fill="var(--color-cat-main)"/>
  <rect x="7" y="7" width="2" height="2" fill="var(--color-ear)"/>
  <rect x="24" y="7" width="2" height="2" fill="var(--color-ear)"/>

  <!-- Tail -->
  <rect x="20" y="18" width="6" height="2" fill="var(--color-cat-main)"/>
  <rect x="22" y="16" width="2" height="2" fill="var(--color-cat-main)"/>

  <!-- Eyes and nose -->
  <rect x="12" y="12" width="2" height="2" fill="var(--color-eye)"/>
  <rect x="18" y="12" width="2" height="2" fill="var(--color-eye)"/>
  <rect x="15" y="14" width="2" height="1" fill="var(--color-nose)"/>

  <!-- Simple outline accents (dark pixels) -->
  <rect x="9" y="13" width="1" height="1" fill="var(--color-cat-dark)"/>
  <rect x="22" y="13" width="1" height="1" fill="var(--color-cat-dark)"/>
  <rect x="11" y="16" width="10" height="1" fill="var(--color-cat-dark)"/>

</svg>