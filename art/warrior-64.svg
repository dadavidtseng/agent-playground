<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet">
  <style>
    :root{
      --skin-color: #f2c9a7;
      --hair-color: #2b2117;
      --armor-color: #6b8aa2;
      --accent-color: #dba84a;
      --cloth-color: #6b3b2b;
      --weapon-color: #cfcfcf;
      --outline-color: #000000;
    }
    .outline{fill:var(--outline-color)}
    .skin{fill:var(--skin-color)}
    .hair{fill:var(--hair-color)}
    .armor{fill:var(--armor-color)}
    .accent{fill:var(--accent-color)}
    .cloth{fill:var(--cloth-color)}
    .weapon{fill:var(--weapon-color)}
  </style>

  <!-- Head group -->
  <g id="head">
    <!-- head base -->
    <rect class="skin" x="24" y="8" width="16" height="16"/>
    <!-- hair top -->
    <rect class="hair" x="22" y="6" width="20" height="4"/>
    <rect class="hair" x="22" y="12" width="4" height="2"/>
    <rect class="hair" x="58" y="12" width="4" height="2"/>
    <!-- eyes -->
    <rect class="outline" x="30" y="14" width="2" height="2"/>
    <rect class="outline" x="40" y="14" width="2" height="2"/>
    <!-- mouth -->
    <rect class="outline" x="34" y="20" width="4" height="2"/>
  </g>

  <!-- Body group -->
  <g id="body">
    <!-- cloak/cloth under armor -->
    <rect class="cloth" x="20" y="24" width="24" height="20"/>
    <!-- armor plate -->
    <rect class="armor" x="22" y="26" width="20" height="12"/>
    <!-- armor accent/emblem -->
    <rect class="accent" x="32" y="30" width="4" height="4"/>
    <!-- outline details -->
    <rect class="outline" x="20" y="24" width="2" height="20"/>
    <rect class="outline" x="44" y="24" width="2" height="20"/>
  </g>

  <!-- Armor group -->
  <g id="armor">
    <!-- shoulder pads -->
    <rect class="armor" x="18" y="26" width="4" height="6"/>
    <rect class="armor" x="42" y="26" width="4" height="6"/>
    <!-- helmet rim -->
    <rect class="armor" x="24" y="6" width="16" height="2"/>
  </g>

  <!-- Weapon group -->
  <g id="weapon">
    <!-- sword blade -->
    <rect class="weapon" x="44" y="28" width="4" height="12"/>
    <rect class="outline" x="44" y="26" width="4" height="2"/>
    <!-- hilt -->
    <rect class="cloth" x="42" y="38" width="8" height="2"/>
    <rect class="outline" x="42" y="38" width="2" height="2"/>
    <rect class="outline" x="48" y="38" width="2" height="2"/>
    <!-- handle -->
    <rect class="cloth" x="44" y="40" width="4" height="4"/>
  </g>

  <!-- small feet/outlines -->
  <rect class="outline" x="26" y="44" width="4" height="2"/>
  <rect class="outline" x="38" y="44" width="4" height="2"/>

  <rect x="0" y="0" width="64" height="64" fill="none" stroke="none"/>
</svg>
