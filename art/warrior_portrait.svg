<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Pixel-art warrior (256x256)">
  <!-- Pixel-art grid: 16x16 cells, cell size = 16 -->
  <!-- Groups and IDs/classes provided for styling/animation -->

  <defs>
    <!-- Colors exposed here for reference (not required for rendering) -->
  </defs>

  <!-- Layer: cloak (back) -->
  <g id="layer_cloak" class="cloak">
    <rect x="48" y="96" width="16" height="16" fill="#7a1730" /> <!-- (3,6) -->
    <rect x="32" y="112" width="16" height="16" fill="#7a1730" /> <!-- (2,7) -->
    <rect x="48" y="112" width="16" height="16" fill="#7a1730" /> <!-- (3,7) -->
    <rect x="32" y="128" width="16" height="16" fill="#7a1730" /> <!-- (2,8) -->
    <rect x="48" y="128" width="16" height="16" fill="#7a1730" /> <!-- (3,8) -->
    <rect x="32" y="144" width="16" height="16" fill="#7a1730" /> <!-- (2,9) -->
  </g>

  <!-- Layer: armor (main) -->
  <g id="layer_armor" class="armor">
    <!-- Helmet top -->
    <rect x="96" y="0" width="16" height="16" fill="#4b6b8a" /> <!-- (6,0) -->
    <rect x="112" y="0" width="16" height="16" fill="#4b6b8a" /> <!-- (7,0) -->
    <rect x="128" y="0" width="16" height="16" fill="#4b6b8a" /> <!-- (8,0) -->
    <rect x="144" y="0" width="16" height="16" fill="#4b6b8a" /> <!-- (9,0) -->
    <!-- Helmet middle -->
    <rect x="80" y="16" width="16" height="16" fill="#4b6b8a" /> <!-- (5,1) -->
    <rect x="96" y="16" width="16" height="16" fill="#4b6b8a" /> <!-- (6,1) -->
    <rect x="112" y="16" width="16" height="16" fill="#4b6b8a" /> <!-- (7,1) -->
    <rect x="128" y="16" width="16" height="16" fill="#4b6b8a" /> <!-- (8,1) -->
    <rect x="144" y="16" width="16" height="16" fill="#4b6b8a" /> <!-- (9,1) -->
    <rect x="160" y="16" width="16" height="16" fill="#4b6b8a" /> <!-- (10,1) -->
    <!-- Helmet sides -->
    <rect x="64" y="32" width="16" height="16" fill="#4b6b8a" /> <!-- (4,2) -->
    <rect x="80" y="32" width="16" height="16" fill="#4b6b8a" /> <!-- (5,2) -->
    <rect x="160" y="32" width="16" height="16" fill="#4b6b8a" /> <!-- (10,2) -->
    <rect x="176" y="32" width="16" height="16" fill="#4b6b8a" /> <!-- (11,2) -->

    <rect x="64" y="48" width="16" height="16" fill="#4b6b8a" /> <!-- (4,3) -->
    <rect x="176" y="48" width="16" height="16" fill="#4b6b8a" /> <!-- (11,3) -->

    <rect x="64" y="64" width="16" height="16" fill="#4b6b8a" /> <!-- (4,4) -->
    <rect x="176" y="64" width="16" height="16" fill="#4b6b8a" /> <!-- (11,4) -->

    <!-- Armor band -->
    <rect x="80" y="80" width="16" height="16" fill="#4b6b8a" /> <!-- (5,5) -->
    <rect x="96" y="80" width="16" height="16" fill="#4b6b8a" /> <!-- (6,5) -->
    <rect x="112" y="80" width="16" height="16" fill="#4b6b8a" /> <!-- (7,5) -->
    <rect x="128" y="80" width="16" height="16" fill="#4b6b8a" /> <!-- (8,5) -->
    <rect x="144" y="80" width="16" height="16" fill="#4b6b8a" /> <!-- (9,5) -->
    <rect x="160" y="80" width="16" height="16" fill="#4b6b8a" /> <!-- (10,5) -->
    <rect x="176" y="80" width="16" height="16" fill="#4b6b8a" /> <!-- (11,5) -->

    <!-- Shoulders and upper arms -->
    <rect x="80" y="96" width="16" height="16" fill="#4b6b8a" /> <!-- (5,6) -->
    <rect x="96" y="96" width="16" height="16" fill="#4b6b8a" /> <!-- (6,6) -->
    <rect x="112" y="96" width="16" height="16" fill="#4b6b8a" /> <!-- (7,6) -->
    <rect x="128" y="96" width="16" height="16" fill="#4b6b8a" /> <!-- (8,6) -->
    <rect x="144" y="96" width="16" height="16" fill="#4b6b8a" /> <!-- (9,6) -->
    <rect x="160" y="96" width="16" height="16" fill="#4b6b8a" /> <!-- (10,6) -->
  </g>

  <!-- Layer: head (skin, eyes, trim) -->
  <g id="head">
    <!-- Skin pixels -->
    <g id="layer_skin" class="skin">
      <rect x="96" y="32" width="16" height="16" fill="#f1c27d" /> <!-- (6,2) -->
      <rect x="112" y="32" width="16" height="16" fill="#f1c27d" /> <!-- (7,2) -->
      <rect x="128" y="32" width="16" height="16" fill="#f1c27d" /> <!-- (8,2) -->
      <rect x="144" y="32" width="16" height="16" fill="#f1c27d" /> <!-- (9,2) -->

      <rect x="96" y="48" width="16" height="16" fill="#f1c27d" /> <!-- (6,3) -->
      <rect x="144" y="48" width="16" height="16" fill="#f1c27d" /> <!-- (9,3) -->

      <rect x="96" y="64" width="16" height="16" fill="#f1c27d" /> <!-- (6,4) -->
      <rect x="112" y="64" width="16" height="16" fill="#f1c27d" /> <!-- (7,4) -->
      <rect x="128" y="64" width="16" height="16" fill="#f1c27d" /> <!-- (8,4) -->
      <rect x="144" y="64" width="16" height="16" fill="#f1c27d" /> <!-- (9,4) -->
    </g>

    <!-- Eyes (outline/black) -->
    <g id="layer_eyes" class="eyes">
      <rect x="112" y="48" width="16" height="16" fill="#000000" /> <!-- (7,3) -->
      <rect x="128" y="48" width="16" height="16" fill="#000000" /> <!-- (8,3) -->
    </g>

    <!-- Helmet trim (gold) -->
    <g id="layer_trim" class="trim">
      <rect x="80" y="64" width="16" height="16" fill="#d1b26f" /> <!-- (5,4) -->
      <rect x="160" y="64" width="16" height="16" fill="#d1b26f" /> <!-- (10,4) -->
    </g>
  </g>

  <!-- Layer: lower body (legs/boots) -->
  <g id="layer_lower" class="lower">
    <rect x="96" y="112" width="16" height="16" fill="#4b6b8a" /> <!-- (6,7) armor lower -->
    <rect x="112" y="112" width="16" height="16" fill="#4b6b8a" /> <!-- (7,7) -->
    <rect x="128" y="112" width="16" height="16" fill="#4b6b8a" /> <!-- (8,7) -->
    <rect x="144" y="112" width="16" height="16" fill="#4b6b8a" /> <!-- (9,7) -->

    <!-- Boots (darker) -->
    <rect x="96" y="144" width="16" height="16" fill="#2b1b0f" /> <!-- (6,9) -->
    <rect x="144" y="144" width="16" height="16" fill="#2b1b0f" /> <!-- (9,9) -->
  </g>

  <!-- Layer: weapon (sword) -->
  <g id="sword" class="weapon">
    <!-- Blade -->
    <rect x="192" y="48" width="16" height="16" fill="#cfd8dc" /> <!-- (12,3) -->
    <rect x="192" y="64" width="16" height="16" fill="#cfd8dc" /> <!-- (12,4) -->
    <rect x="192" y="80" width="16" height="16" fill="#cfd8dc" /> <!-- (12,5) -->
    <rect x="208" y="80" width="16" height="16" fill="#cfd8dc" /> <!-- (13,5) tip -->
    <rect x="192" y="96" width="16" height="16" fill="#cfd8dc" /> <!-- (12,6) -->
    <rect x="192" y="112" width="16" height="16" fill="#cfd8dc" /> <!-- (12,7) -->
    <rect x="192" y="128" width="16" height="16" fill="#cfd8dc" /> <!-- (12,8) -->
    <!-- Hilt -->
    <rect x="208" y="48" width="16" height="16" fill="#5b3a29" /> <!-- (13,3) -->
    <rect x="208" y="64" width="16" height="16" fill="#5b3a29" /> <!-- (13,4) -->
  </g>

  <!-- Layer: shield / detail (optional) -->
  <g id="shield" class="shield">
    <rect x="208" y="144" width="16" height="16" fill="#8a4b3e" /> <!-- (13,9) -->
    <rect x="224" y="144" width="16" height="16" fill="#8a4b3e" /> <!-- (14,9) -->
    <rect x="224" y="128" width="16" height="16" fill="#8a4b3e" /> <!-- (14,8) -->
  </g>

  <!-- Layer: subtle highlight on armor -->
  <g id="layer_highlight" class="highlight">
    <rect x="112" y="80" width="16" height="16" fill="#7fa0bf" opacity="0.9" /> <!-- (7,5) highlight -->
    <rect x="128" y="96" width="16" height="16" fill="#7fa0bf" opacity="0.8" /> <!-- (8,6) -->
  </g>

</svg>
