<?xml version="1.0" encoding="UTF-8"?>
<svg width="768" height="1024" viewBox="0 0 768 1024" xmlns="http://www.w3.org/2000/svg">
  <title id="t-title">Tablet mockup - Profile Card</title>
  <desc id="t-desc">Tablet layout showing wider card, avatar, stats in row, bio and actions</desc>
  <rect x="0" y="0" width="768" height="1024" fill="#f7fafc"/>
  <!-- Card -->
  <g id="card" transform="translate(56,48)">
    <rect x="0" y="0" width="656" height="360" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
    <!-- Header -->
    <g id="header">
      <circle cx="56" cy="56" r="24" fill="#e0e7ff" stroke="#e5e7eb" />
      <text x="104" y="48" font-family="Inter, Arial" font-size="20" font-weight="700" fill="#111827">Jane Doe</text>
      <text x="104" y="72" font-family="Inter, Arial" font-size="14" fill="#6b7280">Product Designer</text>
      <!-- action -->
      <rect x="524" y="38" width="96" height="44" rx="8" fill="#0b63ff" />
      <text x="572" y="66" font-family="Inter, Arial" font-size="14" fill="#ffffff" text-anchor="middle">Follow</text>
    </g>
    <!-- Stats -->
    <g id="stats" transform="translate(24,128)">
      <text x="0" y="0" font-family="Inter" font-size="18" font-weight="600" fill="#111827">1.2k</text>
      <text x="0" y="22" font-family="Inter" font-size="12" fill="#6b7280">Followers</text>
      <text x="160" y="0" font-family="Inter" font-size="18" font-weight="600" fill="#111827">210</text>
      <text x="160" y="22" font-family="Inter" font-size="12" fill="#6b7280">Following</text>
      <text x="320" y="0" font-family="Inter" font-size="18" font-weight="600" fill="#111827">34</text>
      <text x="320" y="22" font-family="Inter" font-size="12" fill="#6b7280">Posts</text>
    </g>
    <!-- Bio -->
    <text x="24" y="200" font-family="Inter" font-size="14" fill="#111827" width="608">Designing intuitive interfaces and systems. Focused on accessibility and scalable design systems. Loves dogs and coffee. Available for speaking engagements.</text>
    <!-- Actions -->
    <rect x="24" y="260" width="180" height="48" rx="8" fill="#0b63ff" />
    <text x="114" y="292" font-family="Inter" font-size="14" fill="#ffffff" text-anchor="middle">Message</text>
    <rect x="220" y="260" width="180" height="48" rx="8" fill="#ffffff" stroke="#e5e7eb" />
    <text x="310" y="292" font-family="Inter" font-size="14" fill="#111827" text-anchor="middle">Portfolio</text>
    <!-- Annotations -->
    <text x="0" y="380" font-family="Inter" font-size="12" fill="#6b7280">Tablet spacing: card padding 24px; avatar 48px; stats inline; actions grouped</text>
  </g>
</svg>