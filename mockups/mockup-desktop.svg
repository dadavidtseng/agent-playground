<?xml version="1.0" encoding="UTF-8"?>
<svg width="1120" height="768" viewBox="0 0 1120 768" xmlns="http://www.w3.org/2000/svg">
  <title id="d-title">Desktop mockup - Profile Card</title>
  <desc id="d-desc">Desktop layout with wide card, left column avatar & bio, right column stats & actions</desc>
  <rect x="0" y="0" width="1120" height="768" fill="#f7fafc"/>
  <!-- Card -->
  <g id="card" transform="translate(80,80)">
    <rect x="0" y="0" width="960" height="240" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
    <!-- Left column -->
    <g id="left" transform="translate(24,24)">
      <circle cx="56" cy="56" r="28" fill="#e0e7ff" stroke="#e5e7eb" />
      <text x="112" y="44" font-family="Inter" font-size="20" font-weight="700" fill="#111827">Jane Doe</text>
      <text x="112" y="68" font-family="Inter" font-size="14" fill="#6b7280">Product Designer</text>
      <text x="112" y="102" font-family="Inter" font-size="14" fill="#111827">Designing accessible, scalable systems. Speaker. Mentor.</text>
    </g>
    <!-- Right column -->
    <g id="right" transform="translate(640,24)">
      <text x="0" y="0" font-family="Inter" font-size="18" font-weight="600" fill="#111827">1.2k</text>
      <text x="0" y="22" font-family="Inter" font-size="12" fill="#6b7280">Followers</text>
      <text x="120" y="0" font-family="Inter" font-size="18" font-weight="600" fill="#111827">210</text>
      <text x="120" y="22" font-family="Inter" font-size="12" fill="#6b7280">Following</text>
      <rect x="0" y="58" width="220" height="12" rx="6" fill="#e5e7eb" />
      <rect x="0" y="58" width="140" height="12" rx="6" fill="#0b63ff" />
      <rect x="0" y="92" width="220" height="48" rx="8" fill="#0b63ff" />
      <text x="110" y="124" font-family="Inter" font-size="14" fill="#ffffff" text-anchor="middle">Message</text>
    </g>
    <!-- Annotations -->
    <text x="0" y="276" font-family="Inter" font-size="12" fill="#6b7280">Desktop layout: two-column, avatar 56px, card width 960px, padding 24px</text>
  </g>
</svg>