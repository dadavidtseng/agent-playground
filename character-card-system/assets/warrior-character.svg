<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#1a1a2e"/>
  
  <!-- Helmet -->
  <rect x="70" y="30" width="60" height="10" fill="#4a4a4a"/>
  <rect x="60" y="40" width="80" height="10" fill="#6a6a6a"/>
  <rect x="60" y="50" width="10" height="10" fill="#6a6a6a"/>
  <rect x="70" y="50" width="60" height="10" fill="#8a8a8a"/>
  <rect x="130" y="50" width="10" height="10" fill="#6a6a6a"/>
  
  <!-- Helmet Horn Left -->
  <rect x="50" y="30" width="10" height="10" fill="#ffd700"/>
  <rect x="50" y="40" width="10" height="10" fill="#ffed4e"/>
  
  <!-- Helmet Horn Right -->
  <rect x="140" y="30" width="10" height="10" fill="#ffd700"/>
  <rect x="140" y="40" width="10" height="10" fill="#ffed4e"/>
  
  <!-- Face -->
  <rect x="70" y="60" width="60" height="10" fill="#ffcc99"/>
  <rect x="70" y="70" width="60" height="10" fill="#ffb380"/>
  
  <!-- Eyes -->
  <rect x="80" y="65" width="10" height="5" fill="#000"/>
  <rect x="110" y="65" width="10" height="5" fill="#000"/>
  
  <!-- Neck Guard -->
  <rect x="70" y="80" width="60" height="10" fill="#6a6a6a"/>
  
  <!-- Shoulders -->
  <rect x="40" y="90" width="30" height="10" fill="#8b4513"/>
  <rect x="130" y="90" width="30" height="10" fill="#8b4513"/>
  <rect x="40" y="100" width="30" height="10" fill="#a0522d"/>
  <rect x="130" y="100" width="30" height="10" fill="#a0522d"/>
  
  <!-- Chest Armor -->
  <rect x="70" y="90" width="60" height="10" fill="#c0c0c0"/>
  <rect x="70" y="100" width="60" height="20" fill="#d4d4d4"/>
  <rect x="70" y="120" width="60" height="10" fill="#c0c0c0"/>
  
  <!-- Armor Detail -->
  <rect x="90" y="105" width="20" height="10" fill="#ffd700"/>
  
  <!-- Arms -->
  <rect x="40" y="110" width="20" height="30" fill="#a0522d"/>
  <rect x="140" y="110" width="20" height="30" fill="#a0522d"/>
  
  <!-- Gauntlets -->
  <rect x="40" y="140" width="20" height="20" fill="#6a6a6a"/>
  <rect x="140" y="140" width="20" height="20" fill="#6a6a6a"/>
  
  <!-- Belt -->
  <rect x="70" y="130" width="60" height="10" fill="#8b4513"/>
  <rect x="90" y="130" width="20" height="10" fill="#ffd700"/>
  
  <!-- Lower Body Armor -->
  <rect x="70" y="140" width="60" height="20" fill="#4a4a4a"/>
  <rect x="70" y="160" width="60" height="10" fill="#6a6a6a"/>
  
  <!-- Legs -->
  <rect x="70" y="170" width="25" height="20" fill="#4a4a4a"/>
  <rect x="105" y="170" width="25" height="20" fill="#4a4a4a"/>
  
  <!-- Boots -->
  <rect x="70" y="190" width="25" height="10" fill="#2a2a2a"/>
  <rect x="105" y="190" width="25" height="10" fill="#2a2a2a"/>
  
  <!-- Sword (Right Hand) -->
  <rect x="160" y="100" width="10" height="60" fill="#8a8a8a"/>
  <rect x="155" y="95" width="20" height="5" fill="#ffd700"/>
  <rect x="158" y="90" width="14" height="5" fill="#ffd700"/>
  <rect x="165" y="160" width="5" height="10" fill="#c0c0c0"/>
  
  <!-- Shield (Left Hand) -->
  <rect x="20" y="110" width="20" height="40" fill="#dc143c"/>
  <rect x="25" y="115" width="10" height="30" fill="#ff6347"/>
  <rect x="28" y="125" width="4" height="10" fill="#ffd700"/>
</svg>
