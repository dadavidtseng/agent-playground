<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Warrior Card Demo</title>
  <style>
    :root{--card-bg:#1b1f23;--card-fg:#f6f6f6;--accent:#d68b3a}
    body{font-family:Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; background:#0f1113; color:var(--card-fg); display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; padding:20px}
    .card{background:linear-gradient(180deg,#23272b 0%, #181a1c 100%); border-radius:12px; padding:18px; width:360px; box-shadow:0 10px 30px rgba(0,0,0,.6); display:flex; gap:16px; align-items:center}
    .art{width:140px; height:140px; background:#000; border-radius:8px; display:flex; align-items:center; justify-content:center; overflow:hidden}
    .art img{width:100%; height:100%; object-fit:contain; image-rendering: pixelated;}
    .meta{flex:1}
    .name{font-weight:700; font-size:1.2rem; margin:0 0 6px 0}
    .bio{font-size:.9rem; color:#c9c9c9; margin:6px 0}
    .stats{display:flex; gap:8px; margin-top:8px}
    .stat{background:rgba(255,255,255,0.03); padding:6px 8px; border-radius:6px; font-size:.85rem}
    .images-row{display:flex; gap:8px; margin-top:10px}
    .thumb{width:46px; height:46px; border-radius:6px; overflow:hidden; background:#000}
    .thumb img{width:100%;height:100%;object-fit:cover; image-rendering: pixelated}

    /* Responsive layouts for test viewports */
    @media (max-width: 360px){
      .card{width:320px; padding:12px; gap:10px}
      .art{width:110px;height:110px}
    }

    @media (min-width: 1024px){
      .card{width:720px; display:flex; align-items:flex-start}
      .art{width:260px;height:260px}
      .meta{padding-top:12px}
    }

    /* Make text selectable for QA */
    .card *{user-select:text}
  </style>
</head>
<body>
  <div class="card" id="card" aria-live="polite">
    <div class="art" id="art">
      <img id="mainArt" src="warrior_front.png" alt="Warrior art">
    </div>
    <div class="meta">
      <h1 class="name" id="name">Loading...</h1>
      <div class="bio" id="bio">...</div>
      <div class="stats" id="stats"></div>
      <div class="images-row" id="imagesRow"></div>
    </div>
  </div>

  <script>
    async function loadCharacter(){
      try{
        const res = await fetch('character.json');
        const data = await res.json();
        render(data);
      }catch(err){
        document.getElementById('name').innerText = 'Failed to load character.json';
        console.error(err);
      }
    }

    function render(data){
      document.getElementById('name').innerText = data.name || 'Unknown';
      document.getElementById('bio').innerText = data.bio || '';

      // Main art (use front image if available)
      const main = document.getElementById('mainArt');
      if(data.images && data.images.front){
        main.src = data.images.front;
        main.alt = data.name + ' front art';
      }

      // Stats
      const statsEl = document.getElementById('stats');
      statsEl.innerHTML = '';
      if(data.stats){
        for(const key of Object.keys(data.stats)){
          const s = document.createElement('div');
          s.className = 'stat';
          s.innerText = key.toUpperCase() + ': ' + data.stats[key];
          statsEl.appendChild(s);
        }
      }

      // Thumbnails (other images)
      const imagesRow = document.getElementById('imagesRow');
      imagesRow.innerHTML = '';
      if(data.images){
        for(const k of Object.keys(data.images)){
          const src = data.images[k];
          const t = document.createElement('div');
          t.className = 'thumb';
          const img = document.createElement('img');
          img.src = src;
          img.alt = data.name + ' ' + k;
          t.appendChild(img);
          imagesRow.appendChild(t);
        }
      }
    }

    loadCharacter();
  </script>
</body>
</html>
