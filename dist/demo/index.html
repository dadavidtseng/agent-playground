<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Demo - Accessibility & Visual Check</title>
  <style>
    :root{--color-primary:#1a73e8;--color-bg:#ffffff;--focus:3px rgba(26,115,232,0.3)}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;margin:0;background:var(--color-bg);color:#111}
    header{padding:16px 24px;border-bottom:1px solid #eee}
    main{padding:24px}
    .demo-card{border:1px solid #e6e6e6;padding:16px;border-radius:8px;max-width:560px}
    a.skip{position:absolute;left:-999px;top:auto;width:1px;height:1px;overflow:hidden}
    a.skip:focus{position:static;width:auto;height:auto;padding:8px;background:#000;color:#fff;z-index:1000}
    .focusable:focus{outline: none; box-shadow: var(--focus)}
    .svg-wrap{width:120px;height:120px}
  </style>
</head>
<body>
  <a href="#main" class="skip">Skip to content</a>
  <header>
    <h1>Accessibility & Visual Check Demo</h1>
    <nav aria-label="Demo navigation">
      <a href="#demo" class="focusable">Demo</a>
    </nav>
  </header>
  <main id="main">
    <section class="demo-card" id="demo">
      <h2>Decorative SVG</h2>
      <p>This SVG is decorative and marked aria-hidden. Keyboard focus should skip it.</p>
      <div class="svg-wrap" aria-hidden="true">
        <!-- inlined optimized svg -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" aria-hidden="true" focusable="false"><g fill="none" stroke="#1a73e8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"><circle cx="60" cy="60" r="44"/><path d="M40 60c6-12 18-12 24 0"/></g></svg>
      </div>
      <p><button class="focusable">Primary action</button></p>
    </section>
  </main>
  <footer style="padding:16px;border-top:1px solid #eee">Demo package</footer>
</body>
</html>
