<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Run JS API Tests</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 2rem; }
      button { padding: 0.5rem 1rem; }
      pre { background:#f6f8fa; padding:1rem; border-radius:4px; }
    </style>
  </head>
  <body>
    <h1>JS API Lightweight Tests</h1>
    <p>Open DevTools Console to see assertions. Click the button below to run tests.</p>

    <button id="runBtn">Run Tests</button>

    <h2>Test Fixtures</h2>
    <div id="fixtures"></div>

    <h2>Notes</h2>
    <p>Tests use console.assert; failures will appear in the console. These tests are intentionally minimal and should run in any modern browser.</p>

    <script src="setStat-test.js"></script>
    <script src="toggleBio-test.js"></script>
    <script>
      document.getElementById('runBtn').addEventListener('click', () => {
        runAllTests();
      });

      // expose runAllTests for console use
      window.runAllTests = async function() {
        console.log('Preparing fixtures...');
        document.getElementById('fixtures').innerHTML = '';
        // create containers used by tests
        window.__testFixtures = {};
        // stat fixture
        const statWrap = document.createElement('div');
        statWrap.innerHTML = '<div class="stat" data-stat="strength"><span class="stat-name">Strength</span>: <span class="stat-value">5</span></div>';
        document.getElementById('fixtures').appendChild(statWrap);
        window.__testFixtures.statWrap = statWrap;

        // bio fixture
        const bioWrap = document.createElement('div');
        bioWrap.innerHTML = '\n          <button id="bio-toggle-1" aria-expanded="false" aria-controls="bio-1">Toggle Bio</button>\n          <div id="bio-1" hidden>Bio content here</div>\n        ';
        document.getElementById('fixtures').appendChild(bioWrap);
        window.__testFixtures.bioWrap = bioWrap;

        console.log('Running setStat tests...');
        try { await window.__runSetStatTests && window.__runSetStatTests(); } catch(e){ console.error('setStat tests error', e); }
        console.log('Running toggleBio tests...');
        try { await window.__runToggleBioTests && window.__runToggleBioTests(); } catch(e){ console.error('toggleBio tests error', e); }
        console.log('All tests completed');
      }
    </script>
  </body>
</html>
