<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Pixel portrait 128" shape-rendering="crispEdges" style="image-rendering:pixelated; image-rendering:crisp-edges;">
  <!-- Palette: skin (#f1c27d), hair (#2b1b0e), armor (#9fb2c6), armor-dark (#6f8590), shirt (#4c75a3), eye (#000), metal (#cfd8dc), highlight (#ffffff) -->
  <g id="portrait" data-role="portrait">
    <!-- Hair -->
    <g id="hair" data-role="hair">
      <rect x="28" y="16" width="72" height="8" fill="#2b1b0e"/>
      <rect x="24" y="24" width="80" height="8" fill="#2b1b0e"/>
      <rect x="20" y="32" width="12" height="16" fill="#2b1b0e"/>
      <rect x="96" y="32" width="12" height="16" fill="#2b1b0e"/>
      <rect x="32" y="32" width="64" height="4" fill="#2b1b0e"/>
    </g>

    <!-- Face / Body -->
    <g id="body" data-role="body">
      <!-- Face -->
      <rect x="40" y="36" width="48" height="32" fill="#f1c27d" class="fill-skin"/>
      <!-- Eyes -->
      <g id="eyes" data-role="eyes">
        <rect x="52" y="48" width="4" height="4" fill="#000" class="fill-eye"/>
        <rect x="72" y="48" width="4" height="4" fill="#000" class="fill-eye"/>
        <rect x="56" y="44" width="4" height="4" fill="#ffffff" opacity="0.9" class="fill-highlight"/>
      </g>
      <!-- Mouth -->
      <rect x="60" y="60" width="8" height="4" fill="#6f3f2a"/>
    </g>

    <!-- Armor -->
    <g id="armor" data-role="armor">
      <rect x="36" y="68" width="56" height="20" fill="#9fb2c6" class="fill-armor"/>
      <rect x="44" y="68" width="40" height="4" fill="#6f8590" class="fill-armor-dark"/>
      <rect x="28" y="68" width="8" height="12" fill="#4c75a3" class="fill-shirt"/>
      <rect x="92" y="68" width="8" height="12" fill="#4c75a3" class="fill-shirt"/>
    </g>

    <!-- Weapon -->
    <g id="weapon" data-role="weapon">
      <rect x="20" y="56" width="4" height="24" fill="#6f8590"/>
      <rect x="16" y="52" width="4" height="4" fill="#cfd8dc"/>
      <rect x="24" y="52" width="4" height="4" fill="#6f8590"/>
      <rect x="16" y="80" width="12" height="4" fill="#2b1b0e"/>
    </g>
  </g>
</svg>
