<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Pixel portrait 64" shape-rendering="crispEdges" style="image-rendering:pixelated; image-rendering:crisp-edges;">
  <!-- Palette: skin (#f1c27d), hair (#2b1b0e), armor (#9fb2c6), armor-dark (#6f8590), shirt (#4c75a3), eye (#000), metal (#cfd8dc), highlight (#ffffff) -->
  <g id="portrait" data-role="portrait">
    <!-- Hair -->
    <g id="hair" data-role="hair">
      <rect x="14" y="8" width="36" height="4" fill="#2b1b0e"/>
      <rect x="12" y="12" width="40" height="4" fill="#2b1b0e"/>
      <rect x="10" y="16" width="6" height="8" fill="#2b1b0e"/>
      <rect x="48" y="16" width="6" height="8" fill="#2b1b0e"/>
      <rect x="16" y="16" width="32" height="2" fill="#2b1b0e"/>
    </g>

    <!-- Face / Body -->
    <g id="body" data-role="body">
      <!-- Face -->
      <rect x="20" y="18" width="24" height="16" fill="#f1c27d" class="fill-skin"/>
      <!-- Eyes -->
      <g id="eyes" data-role="eyes">
        <rect x="26" y="24" width="2" height="2" fill="#000" class="fill-eye"/>
        <rect x="36" y="24" width="2" height="2" fill="#000" class="fill-eye"/>
        <rect x="28" y="22" width="2" height="2" fill="#ffffff" opacity="0.9" class="fill-highlight"/>
      </g>
      <!-- Mouth -->
      <rect x="30" y="30" width="4" height="2" fill="#6f3f2a"/>
    </g>

    <!-- Armor -->
    <g id="armor" data-role="armor">
      <rect x="18" y="34" width="28" height="10" fill="#9fb2c6" class="fill-armor"/>
      <rect x="22" y="34" width="20" height="2" fill="#6f8590" class="fill-armor-dark"/>
      <rect x="14" y="34" width="4" height="6" fill="#4c75a3" class="fill-shirt"/>
      <rect x="46" y="34" width="4" height="6" fill="#4c75a3" class="fill-shirt"/>
    </g>

    <!-- Weapon -->
    <g id="weapon" data-role="weapon">
      <rect x="10" y="28" width="2" height="12" fill="#6f8590"/>
      <rect x="8" y="26" width="2" height="2" fill="#cfd8dc"/>
      <rect x="12" y="26" width="2" height="2" fill="#6f8590"/>
      <rect x="8" y="40" width="6" height="2" fill="#2b1b0e"/>
    </g>
  </g>
</svg>
