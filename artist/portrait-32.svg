<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Pixel portrait 32" shape-rendering="crispEdges" style="image-rendering:pixelated; image-rendering:crisp-edges;">
  <!-- Palette: skin (#f1c27d), hair (#2b1b0e), armor (#9fb2c6), armor-dark (#6f8590), shirt (#4c75a3), eye (#000), metal (#cfd8dc), highlight (#ffffff) -->
  <g id="portrait" data-role="portrait">
    <!-- Hair -->
    <g id="hair" data-role="hair">
      <rect x="7" y="4" width="18" height="2" fill="#2b1b0e"/>
      <rect x="6" y="6" width="20" height="2" fill="#2b1b0e"/>
      <rect x="5" y="8" width="2" height="4" fill="#2b1b0e"/>
      <rect x="25" y="8" width="2" height="4" fill="#2b1b0e"/>
      <rect x="8" y="8" width="16" height="1" fill="#2b1b0e"/>
    </g>

    <!-- Face / Body -->
    <g id="body" data-role="body">
      <!-- Face -->
      <rect x="10" y="9" width="12" height="8" fill="#f1c27d" class="fill-skin"/>
      <!-- Eyes -->
      <g id="eyes" data-role="eyes">
        <rect x="13" y="12" width="1" height="1" fill="#000" class="fill-eye"/>
        <rect x="18" y="12" width="1" height="1" fill="#000" class="fill-eye"/>
        <rect x="14" y="11" width="1" height="1" fill="#ffffff" opacity="0.9" class="fill-highlight"/>
      </g>
      <!-- Mouth / chin pixel -->
      <rect x="15" y="15" width="2" height="1" fill="#6f3f2a"/>
    </g>

    <!-- Armor (upper chest visible) -->
    <g id="armor" data-role="armor">
      <rect x="9" y="17" width="14" height="5" fill="#9fb2c6" class="fill-armor"/>
      <rect x="11" y="17" width="10" height="1" fill="#6f8590" class="fill-armor-dark"/>
      <!-- Shoulder accents -->
      <rect x="7" y="17" width="2" height="3" fill="#4c75a3" class="fill-shirt"/>
      <rect x="23" y="17" width="2" height="3" fill="#4c75a3" class="fill-shirt"/>
    </g>

    <!-- Weapon (sword over shoulder) -->
    <g id="weapon" data-role="weapon">
      <rect x="5" y="14" width="1" height="6" fill="#6f8590"/>
      <rect x="4" y="13" width="1" height="1" fill="#cfd8dc"/>
      <rect x="6" y="13" width="1" height="1" fill="#6f8590"/>
      <rect x="4" y="20" width="3" height="1" fill="#2b1b0e"/>
    </g>
  </g>
</svg>
