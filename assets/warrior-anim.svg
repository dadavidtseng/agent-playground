<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="300" height="420" viewBox="0 0 48 64" role="img" aria-labelledby="title-desc-anim" shape-rendering="crispEdges">
  <title id="title-desc-anim">Pixel-art warrior (animated)</title>
  <desc id="desc-anim">Pixel-art warrior with grouped animation layer. Subtle breathing/sway animation using transform on a group. Uses integer-aligned rects and no filters to preserve crisp edges.</desc>

  <!-- Background -->
  <rect x="0" y="0" width="48" height="64" fill="#a6d8f5" />
  <rect x="0" y="60" width="48" height="4" fill="#6b8e23" />

  <!-- Animated group: translate and slight rotate to simulate breathing/sway -->
  <g id="anim-group" transform="translate(0,0)">
    <!-- Helmet outline -->
    <rect x="16" y="4" width="16" height="2" fill="#000000" />
    <rect x="16" y="10" width="16" height="2" fill="#000000" />
    <rect x="16" y="6" width="2" height="4" fill="#000000" />
    <rect x="30" y="6" width="2" height="4" fill="#000000" />

    <!-- Helmet interior (skin) -->
    <rect x="18" y="6" width="12" height="4" fill="#f1c27d" />

    <!-- Visor accent -->
    <rect x="22" y="8" width="4" height="1" fill="#000000" />

    <!-- Body outline -->
    <rect x="14" y="12" width="20" height="20" fill="#000000" />
    <!-- Armor interior -->
    <rect x="15" y="13" width="18" height="18" fill="#c0c0c0" />

    <!-- Armor accent (breastplate) -->
    <rect x="22" y="18" width="4" height="6" fill="#ffd24d" />

    <!-- Cloak lower -->
    <rect x="15" y="31" width="18" height="8" fill="#8b0000" />

    <!-- Left arm & shield -->
    <rect x="8" y="16" width="6" height="3" fill="#000000" />
    <rect x="8" y="19" width="6" height="8" fill="#996633" />
    <rect x="8" y="27" width="6" height="1" fill="#000000" />

    <!-- Right arm & sword -->
    <rect x="34" y="16" width="6" height="3" fill="#000000" />
    <rect x="37" y="19" width="1" height="14" fill="#e6e6e6" />
    <rect x="36" y="33" width="3" height="1" fill="#6b4a2a" />

    <!-- Legs / Boots -->
    <rect x="18" y="39" width="4" height="6" fill="#000000" />
    <rect x="26" y="39" width="4" height="6" fill="#000000" />
    <rect x="19" y="40" width="3" height="5" fill="#6b4a2a" />
    <rect x="27" y="40" width="3" height="5" fill="#6b4a2a" />
  </g>

  <!-- Animation: subtle translateY and rotate around center. Use SMIL for broad browser support; also include inline CSS animation for modern browsers. -->
  <animateTransform xlink:href="#anim-group" attributeName="transform" attributeType="XML"
    type="translate" dur="2s" values="0 0; 0 -0.6; 0 0" repeatCount="indefinite" />

  <!-- CSS fallback (for browsers where SMIL is disabled) - animates transform via inline style (keyframes on group) -->
  <style>
    @keyframes sway {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-1px) rotate(-1deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    #anim-group { transform-origin: 24px 32px; animation: sway 2s ease-in-out infinite; }
  </style>

</svg>
