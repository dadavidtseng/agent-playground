<?xml version="1.0" encoding="UTF-8"?>
<!-- Full-color variant: keeps pixel-art structure but uses slightly expanded palette and small extras. 32x32 base grid. -->
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 32 32" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet">
  <!-- Palette: black,#0f1720 dark outline,#9aa0a6 armor,#4b5563 shadow,#e6c89b skin,#c0392b crimson,#a67c52 brown,#f6d155 gold,#ffffff white highlight -->
  <rect x="12" y="6" width="8" height="1" fill="#0f1720" />
  <rect x="13" y="7" width="6" height="2" fill="#9aa0a6" />
  <rect x="13" y="6" width="6" height="1" fill="#c5cacc" />
  <rect x="14" y="8" width="4" height="2" fill="#e6c89b" />
  <rect x="15" y="9" width="2" height="1" fill="#0f1720" />

  <rect x="13" y="11" width="6" height="5" fill="#9aa0a6" />
  <rect x="15" y="12" width="2" height="3" fill="#c0392b" />
  <rect x="11" y="11" width="2" height="4" fill="#c0392b" />
  <rect x="19" y="11" width="2" height="4" fill="#c0392b" />

  <rect x="9" y="12" width="2" height="3" fill="#a67c52" />
  <rect x="8" y="12" width="1" height="1" fill="#0f1720" />

  <rect x="21" y="10" width="1" height="1" fill="#f6d155" />
  <rect x="21" y="11" width="1" height="4" fill="#ffffff" />

  <rect x="14" y="16" width="1" height="3" fill="#4b5563" />
  <rect x="17" y="16" width="1" height="3" fill="#4b5563" />
  <rect x="14" y="19" width="1" height="1" fill="#0f1720" />
  <rect x="17" y="19" width="1" height="1" fill="#0f1720" />

  <rect x="13" y="10" width="1" height="1" fill="#0f1720" />
  <rect x="18" y="10" width="1" height="1" fill="#0f1720" />

  <!-- highlights on armor -->
  <rect x="14" y="12" width="1" height="1" fill="#ffffff" opacity="0.6" />
  <rect x="18" y="12" width="1" height="1" fill="#ffffff" opacity="0.6" />
</svg>
