<?xml version="1.0" encoding="utf-8"?><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges" aria-labelledby="title desc" role="img"><!-- Layers: #body, #armor, #weapon. CSS hooks: .layer, .body, .armor, .weapon --><title id="title">Pixel-art Warrior</title><desc id="desc">A small pixel-art warrior composed of vector <rect> elements. Layers: body (skin/cloth), armor (helmet/chest), weapon (sword). Scales cleanly at 32x32,64x64,128x128 by adjusting SVG width/height while keeping viewBox 0 0 32 32.</desc><!-- Body layer: skin and base clothing --><g id="body" class="layer body" fill="#6b3e1d"><!-- torso base --> <rect x="12" y="10" width="8" height="6"/> <!-- left leg --> <rect x="14" y="16" width="2" height="4"/> <!-- right leg --> <rect x="16" y="16" width="2" height="4"/> <!-- left arm (under armor) --> <rect x="11" y="11" width="2" height="4"/></g><!-- Skin pixels --> <g fill="#f1c27d" id="skin" class="layer skin"> <rect x="13" y="6" width="6" height="4"/> <!-- chin --> <rect x="14" y="10" width="2" height="1"/> <!-- eyes --> <rect x="14" y="8" width="1" height="1" fill="#2b2b2b"/> <rect x="17" y="8" width="1" height="1" fill="#2b2b2b"/></g><!-- Armor layer: helmet, chestplate, shoulders --><g id="armor" class="layer armor" fill="#4a5568"> <rect x="12" y="5" width="8" height="2"/> <rect x="11" y="9" width="10" height="2"/> <rect x="11" y="10" width="10" height="4"/> <rect x="11" y="9" width="2" height="2"/> <rect x="19" y="9" width="2" height="2"/> </g><!-- Armor accent (lighter) --> <g class="layer armor-accent" fill="#9fb1ff"><rect x="15" y="11" width="2" height="2"/></g><!-- Weapon layer: sword and hilt --><g id="weapon" class="layer weapon"> <rect x="22" y="6" width="1" height="8" fill="#bdbdbd"/> <rect x="21" y="11" width="3" height="1" fill="#333"/> <rect x="21" y="12" width="2" height="1" fill="#6b3e1d"/></g></svg>