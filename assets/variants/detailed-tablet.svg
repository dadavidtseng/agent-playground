  <rect x="268" y="320" width="220" height="44" rx="10" fill="#f1f5f9" stroke="#e6edf6"/>
  <text x="378" y="350" font-family="Inter, Arial" font-size="16" fill="#0f1724" text-anchor="middle">Secondary</text>

  <text x="32" y="420" font-family="Inter, Arial" font-size="12" fill="#6b7280">Detailed tablet: larger radii and padding; use --space-l and --space-xl.</text>
