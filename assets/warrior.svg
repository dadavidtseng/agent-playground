<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="128" height="128" role="img" aria-labelledby="artistTitle artistDesc designerTitle designerDesc" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet">
  <!--
    Author: Artist Agent (KĀDI multi-agent system) & CharacterCard Designer
    Intent: Preserve both the compact 16x16 pixel-art "artist version" and the 64x64 "designer" avatar in a single SVG for flexibility.
    Notes: The artist sprite is included scaled-up (x4) so it aligns to the 64x64 grid while keeping original crisp pixel art.
  -->
  <title id="artistTitle">Pixel warrior (artist version)</title>
  <desc id="artistDesc">A compact pixel-art warrior: helmet, face, armor, sword on the right, shield on the left. Limited palette for clarity and easy theming.</desc>
  <title id="designerTitle">Warrior avatar</title>
  <desc id="designerDesc">Pixel-art style simplified warrior for CharacterCard reference (64x64 grid).</desc>

  <!-- Designer background -->
  <rect width="64" height="64" fill="#0F1724"/>

  <!-- Designer (64x64) simplified warrior -->
  <!-- Helmet -->
  <rect x="18" y="8" width="28" height="10" fill="#374151"/>
  <rect x="20" y="10" width="24" height="6" fill="#9CA3AF"/>
  <rect x="28" y="6" width="8" height="4" fill="#374151"/>
  <!-- Face -->
  <rect x="24" y="18" width="16" height="10" fill="#FFDBB5"/>
  <!-- Eyes -->
  <rect x="28" y="22" width="2" height="2" fill="#0F1724"/>
  <rect x="34" y="22" width="2" height="2" fill="#0F1724"/>
  <!-- Armor torso -->
  <rect x="16" y="30" width="32" height="20" fill="#1F2937"/>
  <rect x="20" y="34" width="24" height="12" fill="#60A5FA"/>
  <!-- Belt -->
  <rect x="24" y="44" width="16" height="4" fill="#FFB020"/>
  <!-- Arms -->
  <rect x="12" y="30" width="4" height="16" fill="#1F2937"/>
  <rect x="48" y="30" width="4" height="16" fill="#1F2937"/>
  <!-- Legs -->
  <rect x="22" y="50" width="6" height="8" fill="#111827"/>
  <rect x="36" y="50" width="6" height="8" fill="#111827"/>
  <!-- Sword (simplified) -->
  <rect x="50" y="18" width="2" height="20" fill="#9CA3AF"/>
  <rect x="49" y="18" width="4" height="2" fill="#374151"/>
  <!-- Shield -->
  <rect x="8" y="22" width="6" height="12" fill="#FFB020"/>
  <rect x="9" y="24" width="4" height="8" fill="#F59E0B"/>

  <!-- Artist (16x16) pixel sprite scaled x4 to align with 64x64 canvas.
       Placed at top-left (0,0) so both versions are visible together. -->
  <g transform="translate(0,0) scale(4)">
    <!-- Palette tokens:
         K: #0b0b0b (outline)
         A: #cfd8dc (armor light)
         B: #6f7b83 (armor dark)
         S: #f1c27d (skin)
         H: #34241f (hair)
         C: #7a3b3b (cloth)
         G: #ffd32a (gold)
         D: #2b65ec (shield blue)
    -->
    <!-- Outline -->
    <g fill="#0b0b0b">
      <!-- helmet rim -->
      <rect x="3" y="0" width="10" height="1"/>
      <rect x="2" y="1" width="12" height="1"/>
      <!-- shoulders/outline -->
      <rect x="2" y="5" width="12" height="1"/>
      <rect x="1" y="6" width="14" height="1"/>
      <rect x="1" y="7" width="1" height="3"/>
      <rect x="14" y="7" width="1" height="3"/>
      <rect x="2" y="10" width="12" height="1"/>
    </g>
    <!-- Helmet -->
    <g fill="#cfd8dc">
      <rect x="4" y="1" width="8" height="2"/>
      <rect x="3" y="3" width="10" height="1"/>
    </g>
    <!-- Hair / plume accent -->
    <rect x="8" y="0" width="1" height="1" fill="#34241f"/>
    <!-- Face -->
    <g fill="#f1c27d">
      <rect x="6" y="3" width="4" height="2"/>
    </g>
    <!-- Eyes -->
    <rect x="6" y="3" width="1" height="1" fill="#0b0b0b"/>
    <rect x="9" y="3" width="1" height="1" fill="#0b0b0b"/>
    <!-- Neck -->
    <rect x="7" y="5" width="2" height="1" fill="#f1c27d"/>
    <!-- Armor main -->
    <g fill="#6f7b83">
      <rect x="3" y="6" width="10" height="2"/>
      <rect x="4" y="8" width="8" height="2"/>
    </g>
    <!-- Cloth / tabard -->
    <rect x="6" y="8" width="4" height="2" fill="#7a3b3b"/>
    <!-- Gold accent (belt / trim) -->
    <rect x="5" y="9" width="6" height="1" fill="#ffd32a"/>
    <!-- Shield (left) -->
    <g>
      <rect x="1" y="6" width="2" height="3" fill="#2b65ec"/>
      <rect x="2" y="6" width="1" height="1" fill="#ffd32a"/>
    </g>
    <!-- Sword (right) -->
    <g>
      <rect x="13" y="6" width="1" height="4" fill="#b0b0b0"/>
      <rect x="12" y="7" width="2" height="1" fill="#8b5a2b"/>
    </g>
    <!-- Legs / boots -->
    <g fill="#6f7b83">
      <rect x="5" y="10" width="2" height="3"/>
      <rect x="9" y="10" width="2" height="3"/>
    </g>
    <g fill="#0b0b0b">
      <rect x="5" y="13" width="2" height="1"/>
      <rect x="9" y="13" width="2" height="1"/>
    </g>
  </g>
</svg>