<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Stylized warrior illustration">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="none"/>
  <!-- shield -->
  <g transform="translate(100,110)">
    <path d="M0-50 L36-20 A60,60 0 0 1 0 50 A60,60 0 0 1 -36-20 Z" fill="#0b1220" stroke="url(#g)" stroke-width="3"/>
  </g>
  <!-- body -->
  <g transform="translate(100,70)">
    <ellipse cx="0" cy="40" rx="24" ry="36" fill="#0f1724" stroke="#25414f"/>
    <rect x="-6" y="-10" width="12" height="36" rx="4" fill="#1f2937"/>
  </g>
  <!-- head -->
  <circle cx="100" cy="40" r="18" fill="#dbeafe" stroke="#0b1220"/>
  <!-- helmet accent -->
  <path d="M82 40 Q100 18 118 40" fill="none" stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>
  <!-- sword -->
  <g transform="translate(140,60) rotate(-20)">
    <rect x="-2" y="-36" width="4" height="60" fill="#c7d2fe"/>
    <rect x="-8" y="-40" width="16" height="8" rx="2" fill="#93c5fd"/>
  </g>
</svg>