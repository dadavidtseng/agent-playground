<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 16 16" role="img" aria-labelledby="title-desc" shape-rendering="crispEdges">
  <title id="title-desc">Pixel-art warrior (thumbnail)</title>
  <desc id="desc">A small 16x16 pixel-art warrior: helmeted head, armor, shield and sword. Designed with integer-aligned rects and crispEdges for pixel-perfect scaling.</desc>
  <!-- Palette: bg:#7ec0ee outline:#000000 skin:#f1c27d armor:#c0c0c0 cloak:#8b0000 sword:#e6e6e6 handle:#6b4a2a shield:#996633 -->
  <!-- Background -->
  <rect x="0" y="0" width="16" height="16" fill="#7ec0ee" />

  <!-- Outline (helmet & body frame) -->
  <!-- helmet top/bottom -->
  <rect x="5" y="2" width="6" height="1" fill="#000000" />
  <rect x="5" y="5" width="6" height="1" fill="#000000" />
  <!-- helmet sides -->
  <rect x="5" y="3" width="1" height="2" fill="#000000" />
  <rect x="10" y="3" width="1" height="2" fill="#000000" />

  <!-- Head (skin) interior -->
  <rect x="6" y="3" width="4" height="2" fill="#f1c27d" />

  <!-- Body outline -->
  <rect x="4" y="6" width="8" height="5" fill="#000000" />
  <!-- Body (armor) interior -->
  <rect x="5" y="7" width="6" height="3" fill="#c0c0c0" />

  <!-- Cloak / lower cloth -->
  <rect x="5" y="10" width="6" height="2" fill="#8b0000" />

  <!-- Left shield -->
  <rect x="2" y="7" width="2" height="3" fill="#996633" />
  <rect x="2" y="6" width="2" height="1" fill="#000000" />
  <rect x="2" y="10" width="2" height="1" fill="#000000" />

  <!-- Right sword (blade + handle) -->
  <rect x="11" y="7" width="1" height="4" fill="#e6e6e6" />
  <rect x="11" y="11" width="1" height="1" fill="#6b4a2a" />
  <rect x="11" y="6" width="1" height="1" fill="#000000" />

</svg>
