<?xml version="1.0" encoding="UTF-8"?>
<!-- Source editable SVG: layered pixel-art monkey on a 24x24 grid -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges">
  <title>Pixel Monkey (source)</title>
  <desc>Editable source SVG with groups: body, eyes, accessories. Grid: 24x24. Palette: brown #8B5A2B, dark #5A331F, beige #F0D8B0, white #FFFFFF, black #000000, red #E63946</desc>

  <!-- Group: body (fur, face, torso) -->
  <g id="body" aria-label="body">
    <!-- Fur/top of head -->
    <rect x="9" y="4" width="6" height="1" fill="#8B5A2B"/>
    <rect x="8" y="5" width="8" height="1" fill="#8B5A2B"/>
    <rect x="6" y="6" width="12" height="1" fill="#8B5A2B"/>
    <rect x="5" y="7" width="14" height="3" fill="#8B5A2B"/>

    <!-- Face area (beige) sits above chest -->
    <rect x="8" y="7" width="8" height="1" fill="#F0D8B0"/>
    <rect x="7" y="8" width="10" height="2" fill="#F0D8B0"/>
    <rect x="8" y="10" width="8" height="1" fill="#F0D8B0"/>
    <rect x="9" y="11" width="6" height="1" fill="#F0D8B0"/>

    <!-- Jaw/shadow (darker brown) -->
    <rect x="9" y="12" width="6" height="1" fill="#5A331F"/>

    <!-- Ears (brown) -->
    <rect x="5" y="8" width="1" height="2" fill="#8B5A2B"/>
    <rect x="18" y="8" width="1" height="2" fill="#8B5A2B"/>
    <rect x="5" y="11" width="1" height="1" fill="#8B5A2B"/>
    <rect x="18" y="11" width="1" height="1" fill="#8B5A2B"/>

    <!-- Body/torso -->
    <rect x="7" y="13" width="10" height="2" fill="#8B5A2B"/>
    <rect x="6" y="15" width="12" height="3" fill="#8B5A2B"/>
  </g>

  <!-- Group: eyes (separate for easy targeting) -->
  <g id="eyes" aria-label="eyes">
    <!-- Left eye white and pupil -->
    <rect x="9" y="9" width="2" height="1" fill="#FFFFFF"/>
    <rect x="9" y="9" width="1" height="1" fill="#000000"/>
    <!-- Right eye white and pupil -->
    <rect x="13" y="9" width="2" height="1" fill="#FFFFFF"/>
    <rect x="14" y="9" width="1" height="1" fill="#000000"/>
  </g>

  <!-- Group: accessories (hat) -->
  <g id="accessories" aria-label="accessories">
    <!-- Little red hat on top -->
    <rect x="10" y="3" width="4" height="1" fill="#E63946"/>
    <rect x="9" y="4" width="6" height="1" fill="#E63946"/>
  </g>
</svg>
