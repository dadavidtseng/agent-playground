<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" preserveAspectRatio="xMidYMid meet" shape-rendering="crispEdges">
  <title>Pixel Art Warrior</title>
  <defs>
    <style>
      .helmet { fill: #8B4513; }
      .helmet-dark { fill: #654321; }
      .helmet-horn { fill: #C0C0C0; }
      .skin { fill: #FFDBAC; }
      .skin-shadow { fill: #E6B98D; }
      .eye { fill: #2C1810; }
      .beard { fill: #8B4513; }
      .armor-base { fill: #4A4A4A; }
      .armor-highlight { fill: #696969; }
      .armor-trim { fill: #DAA520; }
      .cape { fill: #8B0000; }
      .cape-shadow { fill: #660000; }
      .sword-blade { fill: #C0C0C0; }
      .sword-handle { fill: #654321; }
      .sword-guard { fill: #DAA520; }
      .shield { fill: #4A4A4A; }
      .shield-trim { fill: #DAA520; }
      .background { fill: transparent; }
    </style>
  </defs>
  
  <g id="background">
    <rect class="background" width="128" height="128"/>
  </g>
  
  <!-- Cape (behind warrior) -->
  <g id="cape">
    <rect class="cape" x="24" y="52" width="8" height="8"/>
    <rect class="cape" x="24" y="60" width="8" height="16"/>
    <rect class="cape" x="24" y="76" width="8" height="16"/>
    <rect class="cape-shadow" x="24" y="68" width="8" height="8"/>
    <rect class="cape-shadow" x="24" y="84" width="8" height="8"/>
    <rect class="cape" x="96" y="52" width="8" height="8"/>
    <rect class="cape" x="96" y="60" width="8" height="16"/>
    <rect class="cape" x="96" y="76" width="8" height="16"/>
    <rect class="cape-shadow" x="96" y="68" width="8" height="8"/>
    <rect class="cape-shadow" x="96" y="84" width="8" height="8"/>
  </g>
  
  <!-- Body -->
  <g id="body">
    <!-- Torso armor -->
    <rect class="armor-base" x="40" y="52" width="48" height="8"/>
    <rect class="armor-base" x="40" y="60" width="48" height="16"/>
    <rect class="armor-highlight" x="40" y="52" width="8" height="8"/>
    <rect class="armor-highlight" x="48" y="60" width="8" height="8"/>
    <rect class="armor-highlight" x="64" y="60" width="8" height="8"/>
    
    <!-- Armor trim -->
    <rect class="armor-trim" x="40" y="52" width="48" height="4"/>
    <rect class="armor-trim" x="56" y="60" width="16" height="4"/>
  </g>
  
  <!-- Left Arm (shield) -->
  <g id="left-arm">
    <rect class="armor-base" x="24" y="52" width="16" height="8"/>
    <rect class="armor-base" x="24" y="60" width="16" height="16"/>
    <rect class="skin" x="24" y="76" width="16" height="8"/>
    <rect class="skin-shadow" x="24" y="80" width="16" height="4"/>
    
    <!-- Shield -->
    <rect class="shield" x="16" y="60" width="16" height="24"/>
    <rect class="shield-trim" x="16" y="60" width="16" height="4"/>
    <rect class="shield-trim" x="16" y="80" width="16" height="4"/>
    <rect class="shield-trim" x="16" y="60" width="4" height="24"/>
    <rect class="shield-trim" x="28" y="60" width="4" height="24"/>
    <rect class="armor-trim" x="20" y="68" width="8" height="8"/>
  </g>
  
  <!-- Right Arm (sword) -->
  <g id="right-arm">
    <rect class="armor-base" x="88" y="52" width="16" height="8"/>
    <rect class="armor-base" x="88" y="60" width="16" height="16"/>
    <rect class="skin" x="88" y="76" width="16" height="8"/>
    <rect class="skin-shadow" x="88" y="80" width="16" height="4"/>
    
    <!-- Sword -->
    <rect class="sword-blade" x="104" y="52" width="8" height="4"/>
    <rect class="sword-blade" x="104" y="56" width="8" height="24"/>
    <rect class="sword-guard" x="100" y="80" width="16" height="4"/>
    <rect class="sword-handle" x="104" y="84" width="8" height="12"/>
  </g>
  
  <!-- Legs -->
  <g id="legs">
    <!-- Left leg -->
    <rect class="armor-base" x="40" y="76" width="16" height="16"/>
    <rect class="armor-base" x="40" y="92" width="16" height="16"/>
    <rect class="armor-highlight" x="40" y="76" width="8" height="8"/>
    <rect class="armor-trim" x="40" y="76" width="16" height="4"/>
    
    <!-- Right leg -->
    <rect class="armor-base" x="72" y="76" width="16" height="16"/>
    <rect class="armor-base" x="72" y="92" width="16" height="16"/>
    <rect class="armor-highlight" x="72" y="76" width="8" height="8"/>
    <rect class="armor-trim" x="72" y="76" width="16" height="4"/>
    
    <!-- Boots -->
    <rect class="armor-dark" x="40" y="108" width="16" height="12"/>
    <rect class="armor-dark" x="72" y="108" width="16" height="12"/>
  </g>
  
  <!-- Head -->
  <g id="head">
    <!-- Neck -->
    <rect class="skin" x="56" y="44" width="16" height="8"/>
    <rect class="skin-shadow" x="56" y="48" width="16" height="4"/>
    
    <!-- Face -->
    <rect class="skin" x="48" y="20" width="32" height="24"/>
    <rect class="skin-shadow" x="48" y="36" width="32" height="8"/>
    
    <!-- Eyes -->
    <rect class="eye" x="52" y="28" width="4" height="4"/>
    <rect class="eye" x="72" y="28" width="4" height="4"/>
    
    <!-- Beard -->
    <rect class="beard" x="52" y="36" width="24" height="8"/>
    <rect class="beard" x="56" y="44" width="16" height="4"/>
  </g>
  
  <!-- Helmet -->
  <g id="helmet">
    <!-- Base helmet -->
    <rect class="helmet" x="40" y="12" width="48" height="8"/>
    <rect class="helmet" x="40" y="20" width="8" height="16"/>
    <rect class="helmet" x="80" y="20" width="8" height="16"/>
    <rect class="helmet-dark" x="40" y="16" width="48" height="4"/>
    
    <!-- Helmet details -->
    <rect class="helmet" x="48" y="8" width="32" height="4"/>
    <rect class="helmet-dark" x="48" y="20" width="4" height="8"/>
    <rect class="helmet-dark" x="76" y="20" width="4" height="8"/>
    
    <!-- Horns -->
    <rect class="helmet-horn" x="32" y="12" width="8" height="8"/>
    <rect class="helmet-horn" x="32" y="8" width="4" height="4"/>
    <rect class="helmet-horn" x="88" y="12" width="8" height="8"/>
    <rect class="helmet-horn" x="92" y="8" width="4" height="4"/>
    
    <!-- Nose guard -->
    <rect class="helmet-dark" x="60" y="28" width="8" height="8"/>
  </g>
</svg>
