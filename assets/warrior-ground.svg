<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet">
  <title>Pixel-art Warrior — 64x64 with ground base</title>
  <desc>Palette: armor_dark:#2b2f3a, armor_light:#4b5563, metal:#b9c0c8, gold:#ffd24a, skin:#f2c9a0, cloth:#7b3f00, shield:#2f8f4d, boot:#111417, ground:#3a2f1f. License: CC0 — public domain.</desc>

  <!-- Ground base -->
  <rect x="0" y="54" width="64" height="10" fill="#3a2f1f" />

  <!-- Helmet trim (gold) -->
  <rect x="26" y="12" width="12" height="1" fill="#ffd24a" />
  <!-- Helmet base -->
  <rect x="26" y="13" width="12" height="5" fill="#2b2f3a" />
  <!-- Visor highlight -->
  <rect x="30" y="14" width="4" height="2" fill="#b9c0c8" />

  <!-- Face -->
  <rect x="28" y="18" width="8" height="3" fill="#f2c9a0" />

  <!-- Body / Armor -->
  <rect x="24" y="21" width="16" height="12" fill="#4b5563" />
  <!-- Armor center darker band -->
  <rect x="30" y="22" width="4" height="10" fill="#2b2f3a" />

  <!-- Left arm -->
  <rect x="20" y="21" width="4" height="10" fill="#4b5563" />
  <!-- Sword (held in left hand) -->
  <rect x="18" y="14" width="2" height="12" fill="#b9c0c8" />
  <rect x="17" y="14" width="1" height="2" fill="#ffd24a" />

  <!-- Right arm -->
  <rect x="40" y="21" width="4" height="10" fill="#4b5563" />
  <!-- Shield (in front of right arm) -->
  <rect x="42" y="24" width="6" height="8" fill="#2f8f4d" />
  <!-- Shield rim -->
  <rect x="42" y="24" width="1" height="8" fill="#b9c0c8" />
  <rect x="47" y="24" width="1" height="8" fill="#b9c0c8" />

  <!-- Cloth sash -->
  <rect x="28" y="26" width="8" height="3" fill="#7b3f00" />

  <!-- Legs / Boots -->
  <rect x="26" y="33" width="5" height="8" fill="#111417" />
  <rect x="33" y="33" width="5" height="8" fill="#111417" />

  <!-- Small highlights -->
  <rect x="25" y="23" width="2" height="2" fill="#b9c0c8" opacity="0.9" />
  <rect x="37" y="23" width="2" height="2" fill="#b9c0c8" opacity="0.9" />

  <!-- Metadata comment: Created for task 77d2de92-0cb3-44a7-8fbc-68ed33e10669 -->
</svg>
