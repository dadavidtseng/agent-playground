<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Pixel-art warrior - 32x32 grid, displayed at 64x64 -->
  <!-- Palette: same as 16px but scaled -->
  <!-- Helmet top -->
  <rect x="12" y="0" width="8" height="2" fill="#3b2f2f"/>
  <rect x="10" y="2" width="12" height="2" fill="#3b2f2f"/>
  <rect x="8" y="4" width="16" height="2" fill="#3b2f2f"/>
  <!-- Face -->
  <rect x="12" y="6" width="8" height="2" fill="#b5651d"/>
  <!-- Eyes -->
  <rect x="12" y="8" width="2" height="2" fill="#000000"/>
  <rect x="18" y="8" width="2" height="2" fill="#000000"/>
  <rect x="14" y="8" width="4" height="2" fill="#b5651d"/>
  <!-- Neck/armor -->
  <rect x="12" y="10" width="8" height="2" fill="#6b6b6b"/>
  <!-- Body -->
  <rect x="8" y="12" width="16" height="8" fill="#6b6b6b"/>
  <!-- Cape -->
  <rect x="4" y="12" width="4" height="12" fill="#8b0000"/>
  <rect x="24" y="12" width="4" height="12" fill="#8b0000"/>
  <!-- Shield -->
  <rect x="2" y="16" width="4" height="6" fill="#c8b560"/>
  <rect x="2" y="14" width="2" height="2" fill="#3b2f2f"/>
  <!-- Sword -->
  <rect x="26" y="14" width="2" height="8" fill="#000000"/>
  <rect x="26" y="12" width="2" height="2" fill="#FFFFFF"/>
  <!-- Legs -->
  <rect x="10" y="22" width="4" height="4" fill="#3b2f2f"/>
  <rect x="18" y="22" width="4" height="4" fill="#3b2f2f"/>
  <!-- Boots -->
  <rect x="10" y="26" width="4" height="2" fill="#000000"/>
  <rect x="18" y="26" width="4" height="2" fill="#000000"/>
  <!-- Outline accents -->
  <rect x="8" y="10" width="2" height="2" fill="#000000"/>
  <rect x="26" y="10" width="2" height="2" fill="#000000"/>
</svg>