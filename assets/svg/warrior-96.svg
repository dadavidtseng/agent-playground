<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" shape-rendering="crispEdges">
  <!-- Scaled-up pixel-art warrior (transparent) - created using integer grid scaled from 48 -> 96 (factor 2) -->
  <metadata>name: warrior-96.svg | license: CC0</metadata>
  <g id="outline" fill="#000000">
    <rect x="18" y="6" width="60" height="6" />
    <rect x="12" y="12" width="72" height="6" />
    <rect x="6" y="18" width="84" height="6" />
    <rect x="6" y="24" width="12" height="36" />
    <rect x="78" y="24" width="12" height="36" />
    <rect x="18" y="60" width="60" height="6" />
    <rect x="24" y="66" width="48" height="12" />
  </g>
  <g id="armor" fill="#a8a8a8">
    <rect x="24" y="60" width="24" height="6" />
    <rect x="48" y="60" width="24" height="6" />
    <rect x="30" y="66" width="36" height="6" />
    <rect x="36" y="72" width="24" height="6" />
  </g>
  <g id="cloak" fill="#b22222">
    <rect x="12" y="66" width="12" height="12" />
    <rect x="72" y="66" width="12" height="12" />
  </g>
  <g id="helmet" fill="#d4af37">
    <rect x="24" y="6" width="48" height="6" />
    <rect x="30" y="12" width="36" height="6" />
    <rect x="36" y="18" width="24" height="6" />
    <rect x="36" y="24" width="24" height="6" fill="#c99f2d" />
  </g>
  <g id="visor" fill="#2b2b2b">
    <rect x="36" y="30" width="24" height="6" />
  </g>
  <g id="face" fill="#f0c28b">
    <rect x="36" y="36" width="24" height="12" />
  </g>
  <g id="detail" fill="#ffffff" opacity="0.9">
    <rect x="42" y="38" width="4" height="2" />
  </g>
</svg>
