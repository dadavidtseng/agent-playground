<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192" shape-rendering="crispEdges">
  <!-- Idle animation frames as <symbol> elements. Each symbol holds a 48x48 grid scaled to 192 for clarity. -->
  <metadata>name: warrior-frames.svg | license: CC0 | frames: 3</metadata>

  <!-- Frame 1: neutral -->
  <symbol id="frame-1" viewBox="0 0 48 48">
    <g fill="#000000">
      <rect x="9" y="3" width="30" height="3" />
      <rect x="6" y="6" width="36" height="3" />
      <rect x="3" y="9" width="42" height="3" />
      <rect x="3" y="12" width="6" height="18" />
      <rect x="39" y="12" width="6" height="18" />
      <rect x="9" y="30" width="30" height="3" />
      <rect x="12" y="33" width="24" height="6" />
    </g>
    <g fill="#a8a8a8">
      <rect x="12" y="30" width="12" height="3" />
      <rect x="24" y="30" width="12" height="3" />
      <rect x="15" y="33" width="18" height="3" />
      <rect x="18" y="36" width="12" height="3" />
    </g>
    <g fill="#b22222">
      <rect x="6" y="33" width="6" height="6" />
      <rect x="36" y="33" width="6" height="6" />
    </g>
    <g fill="#d4af37">
      <rect x="12" y="3" width="24" height="3" />
      <rect x="15" y="6" width="18" height="3" />
      <rect x="18" y="9" width="12" height="3" />
      <rect x="18" y="12" width="12" height="3" fill="#c99f2d" />
    </g>
    <g fill="#2b2b2b">
      <rect x="18" y="15" width="12" height="3" />
    </g>
    <g fill="#f0c28b">
      <rect x="18" y="18" width="12" height="6" />
    </g>
    <g fill="#ffffff" opacity="0.85">
      <rect x="21" y="19" width="2" height="1" />
    </g>
  </symbol>

  <!-- Frame 2: slight breathing - raise helmet/top by 1 pixel and shift cloak down -->
  <symbol id="frame-2" viewBox="0 0 48 48">
    <g fill="#000000">
      <rect x="9" y="2" width="30" height="3" />
      <rect x="6" y="5" width="36" height="3" />
      <rect x="3" y="8" width="42" height="3" />
      <rect x="3" y="12" width="6" height="18" />
      <rect x="39" y="12" width="6" height="18" />
      <rect x="9" y="30" width="30" height="3" />
      <rect x="12" y="33" width="24" height="6" />
    </g>
    <g fill="#a8a8a8">
      <rect x="12" y="30" width="12" height="3" />
      <rect x="24" y="30" width="12" height="3" />
      <rect x="15" y="33" width="18" height="3" />
      <rect x="18" y="36" width="12" height="3" />
    </g>
    <g fill="#b22222">
      <rect x="6" y="34" width="6" height="6" />
      <rect x="36" y="34" width="6" height="6" />
    </g>
    <g fill="#d4af37">
      <rect x="12" y="2" width="24" height="3" />
      <rect x="15" y="5" width="18" height="3" />
      <rect x="18" y="8" width="12" height="3" />
      <rect x="18" y="12" width="12" height="3" fill="#c99f2d" />
    </g>
    <g fill="#2b2b2b">
      <rect x="18" y="15" width="12" height="3" />
    </g>
    <g fill="#f0c28b">
      <rect x="18" y="19" width="12" height="6" />
    </g>
    <g fill="#ffffff" opacity="0.85">
      <rect x="21" y="20" width="2" height="1" />
    </g>
  </symbol>

  <!-- Frame 3: slight breathing other phase - lower helmet/top by 1 pixel and shift cloak up -->
  <symbol id="frame-3" viewBox="0 0 48 48">
    <g fill="#000000">
      <rect x="9" y="4" width="30" height="3" />
      <rect x="6" y="7" width="36" height="3" />
      <rect x="3" y="10" width="42" height="3" />
      <rect x="3" y="12" width="6" height="18" />
      <rect x="39" y="12" width="6" height="18" />
      <rect x="9" y="30" width="30" height="3" />
      <rect x="12" y="33" width="24" height="6" />
    </g>
    <g fill="#a8a8a8">
      <rect x="12" y="30" width="12" height="3" />
      <rect x="24" y="30" width="12" height="3" />
      <rect x="15" y="33" width="18" height="3" />
      <rect x="18" y="36" width="12" height="3" />
    </g>
    <g fill="#b22222">
      <rect x="6" y="32" width="6" height="6" />
      <rect x="36" y="32" width="6" height="6" />
    </g>
    <g fill="#d4af37">
      <rect x="12" y="4" width="24" height="3" />
      <rect x="15" y="7" width="18" height="3" />
      <rect x="18" y="10" width="12" height="3" />
      <rect x="18" y="12" width="12" height="3" fill="#c99f2d" />
    </g>
    <g fill="#2b2b2b">
      <rect x="18" y="15" width="12" height="3" />
    </g>
    <g fill="#f0c28b">
      <rect x="18" y="17" width="12" height="6" />
    </g>
    <g fill="#ffffff" opacity="0.85">
      <rect x="21" y="18" width="2" height="1" />
    </g>
  </symbol>

</svg>
