<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Pixel-art warrior - 16x16 grid, displayed at 32x32 -->
  <!-- Palette: #000 (outline), #6b6b6b (armor), #b5651d (skin), #3b2f2f (hair/helmet), #8b0000 (cape), #c8b560 (shield), #FFFFFF (sword highlight) -->
  <!-- Row 0 -->
  <rect x="6" y="0" width="4" height="1" fill="#3b2f2f"/>
  <!-- Row 1 -->
  <rect x="5" y="1" width="6" height="1" fill="#3b2f2f"/>
  <!-- Row 2 -->
  <rect x="4" y="2" width="8" height="1" fill="#3b2f2f"/>
  <!-- Face -->
  <rect x="6" y="3" width="4" height="1" fill="#b5651d"/>
  <!-- Helmet top -->
  <rect x="3" y="3" width="3" height="1" fill="#3b2f2f"/>
  <rect x="10" y="3" width="3" height="1" fill="#3b2f2f"/>
  <!-- Eyes/visor -->
  <rect x="6" y="4" width="1" height="1" fill="#000000"/>
  <rect x="9" y="4" width="1" height="1" fill="#000000"/>
  <rect x="7" y="4" width="2" height="1" fill="#b5651d"/>
  <!-- Neck/armor -->
  <rect x="6" y="5" width="4" height="1" fill="#6b6b6b"/>
  <!-- Body -->
  <rect x="4" y="6" width="8" height="4" fill="#6b6b6b"/>
  <!-- Cape -->
  <rect x="2" y="6" width="2" height="6" fill="#8b0000"/>
  <rect x="12" y="6" width="2" height="6" fill="#8b0000"/>
  <!-- Shield (left hand) -->
  <rect x="1" y="8" width="2" height="3" fill="#c8b560"/>
  <rect x="1" y="7" width="1" height="1" fill="#3b2f2f"/>
  <!-- Sword (right hand) -->
  <rect x="13" y="7" width="1" height="4" fill="#000000"/>
  <rect x="13" y="6" width="1" height="1" fill="#FFFFFF"/>
  <!-- Legs -->
  <rect x="5" y="10" width="2" height="2" fill="#3b2f2f"/>
  <rect x="9" y="10" width="2" height="2" fill="#3b2f2f"/>
  <!-- Boots -->
  <rect x="5" y="12" width="2" height="1" fill="#000000"/>
  <rect x="9" y="12" width="2" height="1" fill="#000000"/>
  <!-- Simple outline accents -->
  <rect x="4" y="5" width="1" height="1" fill="#000000"/>
  <rect x="11" y="5" width="1" height="1" fill="#000000"/>
</svg>