<?xml version="1.0" encoding="UTF-8"?>
<!-- Monochrome outline variant for disabled state -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet">
  <g fill="none" stroke="#2b2b2b" stroke-width="2">
    <!-- simple pixel-outline using rectangles with stroke only -->
    <rect x="24" y="18" width="16" height="16" fill="none"/>
    <rect x="26" y="34" width="6" height="12" fill="none"/>
    <rect x="32" y="34" width="6" height="12" fill="none"/>
    <rect x="18" y="18" width="6" height="12" fill="none"/>
    <rect x="40" y="18" width="6" height="12" fill="none"/>
    <rect x="28" y="10" width="8" height="6" fill="none"/>
    <rect x="44" y="24" width="2" height="18" fill="none"/>
  </g>
</svg>
