<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- Pixel-art warrior (filled background) -->
  <metadata>name: warrior-48-filled.svg | license: CC0</metadata>
  <rect x="0" y="0" width="48" height="48" fill="#1e1e1e" />
  <g id="outline" fill="#000000">
    <rect x="9" y="3" width="30" height="3" />
    <rect x="6" y="6" width="36" height="3" />
    <rect x="3" y="9" width="42" height="3" />
    <rect x="3" y="12" width="6" height="18" />
    <rect x="39" y="12" width="6" height="18" />
    <rect x="9" y="30" width="30" height="3" />
    <rect x="12" y="33" width="24" height="6" />
  </g>
  <g id="armor" fill="#a8a8a8">
    <rect x="12" y="30" width="12" height="3" />
