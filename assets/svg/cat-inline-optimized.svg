<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" style="--cat-main:#E3A76F;--cat-outline:#2B2B2B;--cat-accent:#F7D3B0;--eye:#083E2B;--blush:#FFB6C1; shape-rendering:crispEdges; image-rendering:pixelated;">
  <rect x="6" y="5" width="4" height="3" fill="var(--cat-outline)"/>
  <rect x="22" y="5" width="4" height="3" fill="var(--cat-outline)"/>
  <rect x="7" y="6" width="2" height="2" fill="var(--cat-accent)"/>
  <rect x="23" y="6" width="2" height="2" fill="var(--cat-accent)"/>
  <rect x="8" y="7" width="16" height="1" fill="var(--cat-outline)"/>
  <rect x="7" y="8" width="1" height="10" fill="var(--cat-outline)"/>
  <rect x="24" y="8" width="1" height="10" fill="var(--cat-outline)"/>
  <rect x="8" y="18" width="16" height="1" fill="var(--cat-outline)"/>
  <rect x="8" y="8" width="16" height="10" fill="var(--cat-main)"/>
  <!-- Neutral eyes by default; change to happy by swapping these rows -->
  <g id="eyes-neutral">
    <rect x="12" y="11" width="2" height="2" fill="var(--eye)"/>
    <rect x="18" y="11" width="2" height="2" fill="var(--eye)"/>
  </g>
  <g id="eyes-happy" style="display:none;">
    <rect x="12" y="11" width="2" height="1" fill="var(--eye)"/>
    <rect x="18" y="11" width="2" height="1" fill="var(--eye)"/>
    <rect x="12" y="12" width="2" height="1" fill="var(--cat-main)"/>
    <rect x="18" y="12" width="2" height="1" fill="var(--cat-main)"/>
  </g>
  <rect x="10" y="13" width="2" height="1" fill="var(--blush)"/>
  <rect x="20" y="13" width="2" height="1" fill="var(--blush)"/>
  <rect x="15" y="14" width="2" height="1" fill="var(--cat-outline)"/>
  <rect x="15" y="15" width="2" height="1" fill="var(--cat-outline)"/>
</svg>