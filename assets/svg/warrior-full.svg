<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet">
  <!-- Pixel-art warrior - main variant (teal armor) -->
  <!-- Layers: base, skin, hair, armor, cloth, metal, accent, shadow -->
  <g data-layer="shadow" fill="#0b0b0b">
    <rect x="24" y="50" width="16" height="2"/>
  </g>

  <g data-layer="legs" fill="#2f2f2f">
    <rect x="26" y="34" width="6" height="12"/>
    <rect x="32" y="34" width="6" height="12"/>
  </g>

  <g data-layer="boots" fill="#151515">
    <rect x="26" y="46" width="6" height="2"/>
    <rect x="32" y="46" width="6" height="2"/>
  </g>

  <g data-layer="torso" fill="#2b6f86">
    <rect x="24" y="18" width="16" height="16"/>
    <rect x="26" y="34" width="12" height="0"/>
  </g>

  <g data-layer="arms" fill="#2b6f86">
    <rect x="18" y="18" width="6" height="12"/>
    <rect x="40" y="18" width="6" height="12"/>
  </g>

  <g data-layer="cloth" fill="#4a2b6b">
    <rect x="24" y="34" width="16" height="4"/>
  </g>

  <g data-layer="metal" fill="#c0c6c8">
    <!-- sword blade -->
    <rect x="44" y="24" width="2" height="18"/>
    <!-- helmet rim -->
    <rect x="27" y="6" width="10" height="2"/>
  </g>

  <g data-layer="skin" fill="#f1c27d">
    <rect x="28" y="10" width="8" height="6"/>
  </g>

  <g data-layer="hair" fill="#3b2f2f">
    <rect x="26" y="8" width="12" height="4"/>
    <rect x="26" y="12" width="2" height="2"/>
    <rect x="38" y="12" width="2" height="2"/>
  </g>

  <g data-layer="accent" fill="#ffd36b">
    <rect x="30" y="22" width="4" height="2"/>
  </g>

  <!-- small shoulder detail -->
  <g data-layer="shoulder" fill="#1f4b58">
    <rect x="22" y="20" width="4" height="4"/>
    <rect x="38" y="20" width="4" height="4"/>
  </g>

</svg>
