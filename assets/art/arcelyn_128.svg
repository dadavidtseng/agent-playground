<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Palette: #0B1021 (char), #1B2A4A (dark blue), #3B5C86 (blue), #86A5FF (light blue), #FFD166 (gold), #FF7D7D (pink), #FFFFFF (white), #000000 (black) -->
  <rect width="128" height="128" fill="#0B1021" />

  <!-- Background nebula blocks -->
  <rect x="8" y="12" width="36" height="20" fill="#1B2A4A" />
  <rect x="56" y="6" width="56" height="24" fill="#3B5C86" />
  <rect x="20" y="44" width="88" height="28" fill="#86A5FF" opacity="0.12" />

  <!-- Arcelyn silhouette (pixel-style, built from rects) -->
  <!-- Cloak -->
  <rect x="46" y="36" width="36" height="56" fill="#1B2A4A" />
  <rect x="42" y="44" width="6" height="48" fill="#1B2A4A" />
  <rect x="82" y="44" width="6" height="48" fill="#1B2A4A" />

  <!-- Inner robe -->
  <rect x="50" y="44" width="28" height="44" fill="#3B5C86" />
  <rect x="58" y="52" width="12" height="36" fill="#86A5FF" />

  <!-- Head and hood -->
  <rect x="56" y="24" width="16" height="16" fill="#0B1021" />
  <rect x="52" y="20" width="24" height="12" fill="#1B2A4A" />

  <!-- Face glow -->
  <rect x="58" y="28" width="10" height="10" fill="#FFD166" />

  <!-- Staff -->
  <rect x="86" y="60" width="6" height="44" fill="#FFD166" />
  <rect x="84" y="52" width="10" height="10" fill="#FF7D7D" />
  <rect x="86" y="48" width="6" height="6" fill="#FFFFFF" />

  <!-- Stars (small) -->
  <rect x="12" y="18" width="2" height="2" fill="#FFFFFF" />
  <rect x="28" y="22" width="2" height="2" fill="#FFFFFF" />
  <rect x="96" y="16" width="2" height="2" fill="#FFFFFF" />
  <rect x="110" y="30" width="2" height="2" fill="#FFFFFF" />
  <rect x="38" y="8" width="2" height="2" fill="#FFFFFF" />

  <!-- Comet trail blocks -->
  <rect x="6" y="96" width="10" height="4" fill="#86A5FF" opacity="0.9" />
  <rect x="18" y="96" width="14" height="4" fill="#3B5C86" opacity="0.9" />
  <rect x="34" y="96" width="10" height="4" fill="#86A5FF" opacity="0.9" />

  <!-- Decorative border (thin) -->
  <rect x="4" y="4" width="120" height="2" fill="#3B5C86" />
  <rect x="4" y="122" width="120" height="2" fill="#3B5C86" />
  <rect x="4" y="4" width="2" height="120" fill="#3B5C86" />
  <rect x="122" y="4" width="2" height="120" fill="#3B5C86" />
</svg>