<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" shape-rendering="crispEdges">
  <!-- Palette tokens: skin=#F2C9A6, armor=#4B6B8F, cloth=#8A2B2B, metal=#BFC9D6, accent=#FFD166, shadow=#2E2E2E -->
  <!-- Grid: 24x24, pixel size = 5 -->
  <!-- Helmet -->
  <rect x="20" y="0" width="80" height="5" fill="#4B6B8F"/>
  <rect x="10" y="5" width="100" height="5" fill="#4B6B8F"/>
  <rect x="14" y="10" width="92" height="5" fill="#4B6B8F"/>
  <!-- Face -->
  <rect x="36" y="10" width="24" height="30" fill="#F2C9A6"/>
  <!-- Eyes -->
  <rect x="46" y="18" width="4" height="4" fill="#2E2E2E"/>
  <rect x="56" y="18" width="4" height="4" fill="#2E2E2E"/>
  <!-- Body/Armor -->
  <rect x="30" y="40" width="60" height="30" fill="#4B6B8F"/>
  <rect x="34" y="70" width="52" height="30" fill="#8A2B2B"/>
  <!-- Accent / Belt -->
  <rect x="36" y="88" width="48" height="4" fill="#FFD166"/>
  <!-- Shield (left) -->
  <rect x="0" y="40" width="20" height="40" fill="#BFC9D6"/>
  <rect x="6" y="46" width="8" height="28" fill="#4B6B8F"/>
  <!-- Sword (right) -->
  <rect x="100" y="30" width="10" height="50" fill="#BFC9D6"/>
  <rect x="96" y="26" width="16" height="4" fill="#BFC9D6"/>
  <!-- Shadow details -->
  <rect x="30" y="52" width="20" height="10" fill="#2E2E2E"/>
  <rect x="70" y="52" width="20" height="10" fill="#2E2E2E"/>
</svg>