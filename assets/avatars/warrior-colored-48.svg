<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- Palette tokens: skin=#F2C9A6, armor=#4B6B8F, cloth=#8A2B2B, metal=#BFC9D6, accent=#FFD166, shadow=#2E2E2E -->
  <!-- Pixel size: 4 (12x12 grid) -->
  <!-- Helmet -->
  <rect x="8" y="0" width="32" height="4" fill="#4B6B8F"/>
  <rect x="4" y="4" width="40" height="4" fill="#4B6B8F"/>
  <rect x="6" y="8" width="36" height="4" fill="#4B6B8F"/>
  <!-- Face -->
  <rect x="12" y="8" width="8" height="8" fill="#F2C9A6"/>
  <rect x="28" y="8" width="8" height="8" fill="#F2C9A6"/>
  <rect x="20" y="12" width="8" height="4" fill="#2E2E2E"/>
  <!-- Eyes -->
  <rect x="14" y="10" width="2" height="2" fill="#2E2E2E"/>
  <rect x="32" y="10" width="2" height="2" fill="#2E2E2E"/>
  <!-- Body/Armor -->
  <rect x="10" y="16" width="28" height="8" fill="#4B6B8F"/>
  <rect x="12" y="24" width="24" height="8" fill="#8A2B2B"/>
  <!-- Accent / Belt -->
  <rect x="14" y="28" width="20" height="2" fill="#FFD166"/>
  <!-- Shield (left) -->
  <rect x="0" y="16" width="8" height="12" fill="#BFC9D6"/>
  <rect x="2" y="18" width="4" height="8" fill="#4B6B8F"/>
  <!-- Sword (right) -->
  <rect x="40" y="12" width="4" height="16" fill="#BFC9D6"/>
  <rect x="38" y="10" width="8" height="2" fill="#BFC9D6"/>
  <!-- Shadow details -->
  <rect x="10" y="20" width="6" height="4" fill="#2E2E2E"/>
  <rect x="32" y="20" width="6" height="4" fill="#2E2E2E"/>
</svg>