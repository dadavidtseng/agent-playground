<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" id="cc-portrait-warrior-svg" preserveAspectRatio="xMidYMid meet" style="shape-rendering:crispEdges; image-rendering:pixelated; image-rendering:-moz-crisp-edges;">
  <!-- Pixel-art warrior portrait (32x32 grid). Transparent background. -->
  <!-- Groups/layers prefixed with cc-portrait-warrior to avoid collisions -->
  <g id="cc-portrait-warrior-pixels">
    <!-- Palette: outline, helmet dark, helmet light, skin, hair, cloth, gold accent -->
    <!-- Outline: #0b0b0b -->
    <!-- Helmet dark: #6b6f73 -->
    <!-- Helmet light: #c3c6c8 -->
    <!-- Skin: #f1c27d -->
    <!-- Hair: #3b2a1f -->
    <!-- Cloth: #7a1f1f -->
    <!-- Gold: #d6a24f -->

    <!-- Helmet top/crest -->
    <rect x="9" y="3" width="14" height="1" fill="#6b6f73" id="cc-helmet-top-1"/>
    <rect x="8" y="4" width="16" height="1" fill="#6b6f73" id="cc-helmet-top-2"/>
    <rect x="8" y="5" width="2" height="1" fill="#0b0b0b" id="cc-helmet-top-ol-1"/>
    <rect x="22" y="5" width="2" height="1" fill="#0b0b0b" id="cc-helmet-top-ol-2"/>
    <rect x="10" y="5" width="12" height="1" fill="#c3c6c8" id="cc-helmet-top-light"/>

    <!-- Helmet sides -->
    <rect x="7" y="6" width="2" height="2" fill="#6b6f73" id="cc-helmet-side-l"/>
    <rect x="23" y="6" width="2" height="2" fill="#6b6f73" id="cc-helmet-side-r"/>
    <rect x="6" y="8" width="2" height="2" fill="#0b0b0b" id="cc-helmet-ol-l2"/>
    <rect x="24" y="8" width="2" height="2" fill="#0b0b0b" id="cc-helmet-ol-r2"/>

    <!-- Face region -->
    <rect x="9" y="8" width="14" height="1" fill="#f1c27d" id="cc-face-row1"/>
    <rect x="9" y="9" width="2" height="1" fill="#f1c27d" id="cc-face-lcheek"/>
    <rect x="11" y="9" width="10" height="1" fill="#f1c27d" id="cc-face-mid"/>
    <rect x="21" y="9" width="2" height="1" fill="#f1c27d" id="cc-face-rcheek"/>

    <!-- Eyes and nose -->
    <rect x="12" y="10" width="1" height="1" fill="#0b0b0b" id="cc-eye-l"/>
    <rect x="19" y="10" width="1" height="1" fill="#0b0b0b" id="cc-eye-r"/>
    <rect x="15" y="11" width="2" height="1" fill="#0b0b0b" id="cc-nose"/>

    <!-- Mouth -->
    <rect x="13" y="13" width="6" height="1" fill="#3b2a1f" id="cc-mouth"/>

    <!-- Jaw/neck -->
    <rect x="11" y="14" width="10" height="2" fill="#f1c27d" id="cc-jaw"/>
    <rect x="11" y="16" width="10" height="2" fill="#7a1f1f" id="cc-cloth-collar"/>

    <!-- Hair visible under helmet -->
    <rect x="9" y="7" width="2" height="1" fill="#3b2a1f" id="cc-hair-l"/>
    <rect x="21" y="7" width="2" height="1" fill="#3b2a1f" id="cc-hair-r"/>
    <rect x="10" y="6" width="12" height="1" fill="#3b2a1f" id="cc-hair-top"/>

    <!-- Helmet faceguard and trim -->
    <rect x="10" y="10" width="1" height="4" fill="#0b0b0b" id="cc-guard-l"/>
    <rect x="21" y="10" width="1" height="4" fill="#0b0b0b" id="cc-guard-r"/>
    <rect x="11" y="10" width="10" height="1" fill="#6b6f73" id="cc-guard-top"/>
    <rect x="13" y="9" width="6" height="1" fill="#d6a24f" id="cc-helm-gold-trim"/>

    <!-- Shoulder/pauldrons -->
    <rect x="6" y="16" width="4" height="3" fill="#6b6f73" id="cc-pauldrons-l"/>
    <rect x="22" y="16" width="4" height="3" fill="#6b6f73" id="cc-pauldrons-r"/>
    <rect x="5" y="19" width="6" height="2" fill="#0b0b0b" id="cc-pauldrons-l-ol"/>
    <rect x="21" y="19" width="6" height="2" fill="#0b0b0b" id="cc-pauldrons-r-ol"/>

    <!-- Helmet highlights -->
    <rect x="14" y="5" width="4" height="1" fill="#c3c6c8" id="cc-helm-highlight"/>
    <rect x="12" y="6" width="2" height="1" fill="#c3c6c8" id="cc-helm-highlight-2"/>
    <rect x="18" y="6" width="2" height="1" fill="#c3c6c8" id="cc-helm-highlight-3"/>

    <!-- Minor accent pixels for depth -->
    <rect x="11" y="11" width="1" height="1" fill="#6b6f73" id="cc-accent-1"/>
    <rect x="20" y="11" width="1" height="1" fill="#6b6f73" id="cc-accent-2"/>

    <!-- Chin shadow -->
    <rect x="14" y="14" width="4" height="1" fill="#3b2a1f" id="cc-chin-shadow"/>

    <!-- Small stray pixels to finish silhouette -->
    <rect x="8" y="13" width="1" height="1" fill="#6b6f73" id="cc-side-armor-l"/>
    <rect x="23" y="13" width="1" height="1" fill="#6b6f73" id="cc-side-armor-r"/>

  </g>

  <!-- Optional view grid (commented out) -->
  <!--
  <g id="cc-portrait-warrior-grid" fill="none" stroke="#eee">
    <rect x="0" y="0" width="32" height="32" stroke-width="0.2"/>
  </g>
  -->
</svg>
