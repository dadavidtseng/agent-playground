<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CharCard Demo</title>
  <link rel="stylesheet" href="../styles/char-card.css">
</head>
<body>
  <main class="demo-root">
    <h1>Character Profile Card — Demo</h1>

    <section class="demo-grid">
      <char-card id="heroCard"></char-card>

      <template id="example-json" hidden>
{
  "name": "Lyra Windrider",
  "class": "Ranger",
  "level": 12,
  "bio": "A swift scout from the northern wilds, Lyra uses her keen senses and quick blades to outmaneuver foes.",
  "stats": { "hp": 78, "attack": 64, "defense": 52, "speed": 91 }
}
      </template>

    </section>

    <p class="notes">Use keyboard to focus stat bars. Resize the window to see responsive behavior.</p>
  </main>

  <script type="module" src="../scripts/char-card.js"></script>
  <script>
    import('./../scripts/char-card.js').then(mod => {
      const card = document.getElementById('heroCard');

      const svg = `
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120' width='120' height='120' aria-hidden='true' focusable='false'>
  <defs>
    <linearGradient id='g' x1='0' x2='1'>
      <stop offset='0' stop-color='#6EE7B7'/>
      <stop offset='1' stop-color='#3B82F6'/>
    </linearGradient>
  </defs>
  <rect x='6' y='6' width='108' height='108' rx='18' fill='url(#g)' />
  <g transform='translate(20,24)' fill='#fff'>
    <ellipse cx='40' cy='20' rx='18' ry='14' />
    <path d='M2 70c10-18 66-18 76 0v6H2z' />
  </g>
</svg>
      `;

      const example = JSON.parse(document.getElementById('example-json').textContent);

      // Use the component API (data property)
      card.data = Object.assign({}, example, { avatarSvg: svg, variant: 'light' });

    }).catch(err => console.error(err));
  </script>
</body>
</html>
