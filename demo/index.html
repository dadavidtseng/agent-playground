<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Demo — Profile Card</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <section class="profile-card" role="region" aria-label="Profile card for Jane Doe">
      <div class="card-header">
        <!-- Inline SVG icon (kept small and with viewBox for crisp scaling) -->
        <svg class="avatar-svg" viewBox="0 0 64 64" width="64" height="64" aria-hidden="true" focusable="false">
          <circle cx="32" cy="24" r="14" fill="#8aa" />
          <rect x="12" y="40" width="40" height="12" rx="6" fill="#6a8" />
        </svg>
        <div>
          <h1 class="name">Jane Doe</h1>
          <p class="title">Frontend Designer</p>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">UX</div>
          <div class="stat-track" aria-hidden="true">
            <div class="stat-fill" data-target="85" style="width:0%"></div>
          </div>
        </div>
        <div class="stat">
          <div class="stat-label">Visual</div>
          <div class="stat-track" aria-hidden="true">
            <div class="stat-fill" data-target="72" style="width:0%"></div>
          </div>
        </div>
      </div>

      <div class="bio">
        <button id="bio-toggle" aria-expanded="false" aria-controls="bio-text">Show bio</button>
        <div id="bio-text" class="bio-text" hidden>
          <p>Jane is a product designer focused on usable, accessible experiences. She enjoys crafting micro-interactions and clean SVGs.</p>
        </div>
      </div>
    </section>
  </main>
  <script src="script.js" defer></script>
</body>
</html>
