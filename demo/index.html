<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Character Cards Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="demo-header">
    <h1>Character Cards Demo</h1>
    <div class="controls">
      <button id="themeToggle" aria-pressed="false">Toggle theme</button>
      <label class="control-inline">
        <input id="reducedMotionToggle" type="checkbox">
        <span>Reduce motion</span>
      </label>
    </div>
  </header>

  <main class="cards">

    <section class="char-card" data-char-id="1">
      <div class="char-card__avatar" data-svg-src="/art/warrior-avatar.svg" role="img" aria-label="Portrait of Kaya"></div>
      <div class="char-card__body">
        <h2 class="char-card__name">Kaya</h2>
        <button class="char-card__bio-toggle" aria-expanded="false" aria-controls="bio-1">Show bio</button>
        <div id="bio-1" class="char-card__bio" hidden>
          Kaya is a veteran of the northern marches. Quick with a blade and quicker with a joke.
        </div>

        <dl class="char-card__stats" aria-label="Kaya stats">
          <div class="char-card__stat">
            <dt>Strength</dt>
            <dd>
              <div class="char-card__stat-track">
                <div class="char-card__stat-bar" data-value="80" style="width:0%" aria-hidden="true"></div>
              </div>
            </dd>
          </div>

          <div class="char-card__stat">
            <dt>Agility</dt>
            <dd>
              <div class="char-card__stat-track">
                <div class="char-card__stat-bar" data-value="65" style="width:0%" aria-hidden="true"></div>
              </div>
            </dd>
          </div>

          <div class="char-card__stat">
            <dt>Endurance</dt>
            <dd>
              <div class="char-card__stat-track">
                <div class="char-card__stat-bar" data-value="92" style="width:0%" aria-hidden="true"></div>
              </div>
            </dd>
          </div>
        </dl>
      </div>
    </section>

    <section class="char-card" data-char-id="2">
      <div class="char-card__avatar" data-svg-src="/art/warrior-avatar.svg" role="img" aria-label="Portrait of Ruan"></div>
      <div class="char-card__body">
        <h2 class="char-card__name">Ruan</h2>
        <button class="char-card__bio-toggle" aria-expanded="false" aria-controls="bio-2">Show bio</button>
        <div id="bio-2" class="char-card__bio" hidden>
          Ruan prefers to let his shield do the talking. A steady presence on any field.
        </div>

        <dl class="char-card__stats" aria-label="Ruan stats">
          <div class="char-card__stat">
            <dt>Strength</dt>
            <dd>
              <div class="char-card__stat-track">
                <div class="char-card__stat-bar" data-value="74" style="width:0%" aria-hidden="true"></div>
              </div>
            </dd>
          </div>

          <div class="char-card__stat">
            <dt>Agility</dt>
            <dd>
              <div class="char-card__stat-track">
                <div class="char-card__stat-bar" data-value="48" style="width:0%" aria-hidden="true"></div>
              </div>
            </dd>
          </div>

          <div class="char-card__stat">
            <dt>Endurance</dt>
            <dd>
              <div class="char-card__stat-track">
                <div class="char-card__stat-bar" data-value="88" style="width:0%" aria-hidden="true"></div>
              </div>
            </dd>
          </div>
        </dl>
      </div>
    </section>

  </main>

  <script src="script.js" defer></script>
</body>
</html>
