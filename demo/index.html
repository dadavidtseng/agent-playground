<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Character Card Demo</title>
  <link rel="stylesheet" href="/src/styles/character-card.css" />
  <style>
    body{background:var(--cc-bg,#071023);min-height:100vh;color:#e6eef8;margin:0;padding:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial}
    header{padding:20px}
    .container{max-width:1100px;margin:0 auto}
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>Character Profile Card Demo</h1>
      <p>Multiple cards below. Use controls to update stats; cards are accessible and stat bars animate.</p>
    </div>
  </header>
  <main class="container">
    <section>
      <div class="demo-controls" aria-hidden="false">
        <label>STR <input id="ctrl-str" type="range" min="0" max="100" value="68"></label>
        <label>DEX <input id="ctrl-dex" type="range" min="0" max="100" value="42"></label>
        <label>INT <input id="ctrl-int" type="range" min="0" max="100" value="50"></label>
        <label>CHA <input id="ctrl-cha" type="range" min="0" max="100" value="79"></label>
        <button id="apply">Apply to first card</button>
      </div>

      <div class="character-grid" id="cards">
        <!-- cards injected here -->
      </div>
    </section>
  </main>

  <script src="/src/js/characterCardAPI.js"></script>
  <script>
    // sample data
    const chars = [
      {name:'Marin Thorn', class:'Ranger', level:12, hp:{current:78,max:120}, mp:{current:20,max:40}, stats:{str:68,dex:82,int:46,cha:71}},
      {name:'Elda Voss', class:'Mage', level:20, hp:{current:42,max:82}, mp:{current:130,max:150}, stats:{str:18,dex:32,int:94,cha:60}},
      {name:'Gorun Ax', class:'Warrior', level:8, hp:{current:110,max:130}, mp:{current:6,max:20}, stats:{str:88,dex:44,int:22,cha:28}}
    ];

    const container = document.getElementById('cards');
    const created = chars.map(c=>{
      const card = CharacterCardAPI.createCard(c);
      container.appendChild(card);
      return card;
    });

    // interactive controls
    document.getElementById('apply').addEventListener('click', ()=>{
      const stats = {
        str: Number(document.getElementById('ctrl-str').value),
        dex: Number(document.getElementById('ctrl-dex').value),
        int: Number(document.getElementById('ctrl-int').value),
        cha: Number(document.getElementById('ctrl-cha').value)
      };
      // apply to first card
      CharacterCardAPI.setStats(created[0], stats);
    });

    // small a11y: allow keyboard to focus on stat bars and increment using arrow keys
    container.addEventListener('keydown', (e)=>{
      const target = e.target;
      if(target.classList && target.classList.contains('stat-bar')){
        let val = Number(target.getAttribute('aria-valuenow')||0);
        if(e.key === 'ArrowRight' || e.key === 'ArrowUp'){
          val = Math.min(100, val + 1);
          const stat = target.dataset.stat;
          CharacterCardAPI.setStats(target.closest('.character-card'), {[stat]: val});
          e.preventDefault();
        } else if(e.key === 'ArrowLeft' || e.key === 'ArrowDown'){
          val = Math.max(0, val - 1);
          const stat = target.dataset.stat;
          CharacterCardAPI.setStats(target.closest('.character-card'), {[stat]: val});
          e.preventDefault();
        }
      }
    });

  </script>
</body>
</html>
