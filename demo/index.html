<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Game Character Profile Card — Demo</title>
  <link rel="stylesheet" href="/design/tokens.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <h1>Game Character Profile Card — Demo</h1>
    <section class="demo-grid">
      <article id="card-root-1" class="card-root" aria-label="Character profile example 1"></article>
      <article id="card-root-2" class="card-root" aria-label="Character profile example 2"></article>
    </section>

    <section class="controls">
      <h2>API Demo</h2>
      <button id="randomize">Randomize stats (calls updateStats)</button>
      <button id="destroy">Destroy second card</button>
    </section>
  </main>

  <template id="profile-card-template">
    <article class="profile-card" part="card">
      <header class="card-header">
        <div class="avatar" aria-hidden="true">
          <!-- Inline SVG avatar: simple sword+shield icon -->
          <svg width="72" height="72" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
            <defs>
              <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="var(--color-accent)" />
                <stop offset="1" stop-color="#60a5fa" />
              </linearGradient>
            </defs>
            <rect x="0" y="0" width="64" height="64" rx="12" fill="var(--color-surface)" />
            <g transform="translate(8,8)" fill="none" stroke="url(#g1)" stroke-width="2">
              <path d="M8 2 L14 8 L8 14 L2 8 Z" fill="url(#g1)" opacity="0.95"/>
              <path d="M20 4 L28 12" stroke-linecap="round"/>
              <path d="M16 24 L32 8" stroke-linecap="round"/>
            </g>
          </svg>
        </div>
        <div class="meta">
          <h3 class="name">Character Name</h3>
          <p class="role">Wandering Knight</p>
        </div>
        <div class="level">Lv <span class="level-num">12</span></div>
      </header>

      <section class="stats" aria-label="Character stats">
        <!-- stat rows generated by JS -->
      </section>

      <div class="bio-wrapper">
        <button class="bio-toggle" aria-expanded="false" aria-controls="bio-text">Show bio</button>
        <div id="bio-text" class="bio" hidden>
          <p>A stoic knight who travels between kingdoms defending the weak and seeking redemption for past failures.</p>
        </div>
      </div>

    </article>
  </template>

  <script type="module" src="card.js"></script>
</body>
</html>
