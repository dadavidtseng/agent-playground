<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Character Cards — Demo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="demo">
    <header class="demo__header">
      <h1>Character Cards — Demo</h1>
      <p class="lead">A small component demo illustrating design tokens, responsive layout, and animated stat bars.</p>
    </header>

    <!-- Root container for cards. Data attributes can drive automatic initialization. -->
    <section id="character-root" class="card-grid" data-init="true" data-source="inline">
      <!-- Sample data is provided in the page as JSON and will be read by the script when data-init is true. -->
      <script id="demo-sample-data" type="application/json">
        [
          {
            "name": "Ayla Storm",
            "class": "Ranger",
            "level": 12,
            "bio": "A swift scout and master of the wilds.",
            "avatarTitle": "Ayla Avatar",
            "stats": { "HP": 78, "STR": 62, "DEX": 94, "INT": 55 }
          },
          {
            "name": "Kor the Bold",
            "class": "Warrior",
            "level": 15,
            "bio": "A stalwart protector with unmatched courage.",
            "avatarTitle": "Kor Avatar",
            "stats": { "HP": 120, "STR": 110, "DEX": 48, "INT": 40 }
          },
          {
            "name": "Mira of Mists",
            "class": "Mage",
            "level": 11,
            "bio": "A scholar of arcane arts and subtle illusions.",
            "avatarTitle": "Mira Avatar",
            "stats": { "HP": 52, "STR": 30, "DEX": 60, "INT": 132 }
          }
        ]
      </script>
    </section>

    <footer class="demo__footer">
      <p>Open the console to use the JS API (CharacterCard.init([...])).</p>
    </footer>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
