<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Character Cards — Demo</title>
  <link rel="stylesheet" href="./design/tokens.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="container">
    <header class="demo-header">
      <h1>Character Cards (Demo)</h1>
      <p class="lead">Reusable, framework-agnostic character card component. Animations run on mount. ARIA-enabled stat bars.</p>
    </header>

    <!-- Template used by the JS initializer to mount cards -->
    <template id="character-card-template">
      <article class="card" tabindex="0">
        <div class="card-header">
          <div class="avatar" aria-hidden="true"></div>
          <div class="meta">
            <h2 class="character-name"></h2>
            <p class="character-role"></p>
          </div>
        </div>

        <div class="card-body">
          <ul class="stats" aria-hidden="false">
            <!-- Each stat item expects data-stat and will be filled by JS when mounted -->
            <!-- Example structure:
            <li class="stat">
              <div class="stat-label">Strength</div>
              <div class="stat-track">
                <div class="stat-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
              </div>
              <div class="stat-value" aria-hidden="true">75</div>
            </li>
            -->
          </ul>
        </div>
      </article>
    </template>

    <!-- Container where cards will be mounted -->
    <section id="character-cards" class="cards" aria-live="polite"></section>

    <!-- Noscript fallback: simple static cards for progressive enhancement -->
    <noscript>
      <section class="cards no-js">
        <article class="card">
          <div class="card-header">
            <div class="avatar">
              <svg width="64" height="64" viewBox="0 0 64 64" aria-hidden="true">
                <circle cx="32" cy="32" r="30" fill="#6C8EF5"></circle>
                <text x="32" y="38" font-size="22" text-anchor="middle" fill="#fff">AL</text>
              </svg>
            </div>
            <div class="meta">
              <h2 class="character-name">Alya Monroe</h2>
              <p class="character-role">Scout</p>
            </div>
          </div>
          <div class="card-body">
            <ul class="stats">
              <li class="stat"><span class="stat-label">Strength</span><span class="stat-value">28</span></li>
              <li class="stat"><span class="stat-label">Agility</span><span class="stat-value">86</span></li>
              <li class="stat"><span class="stat-label">Intelligence</span><span class="stat-value">64</span></li>
            </ul>
          </div>
        </article>
      </section>
    </noscript>

    <footer class="demo-footer">
      <p>Demo data and API usage in README.</p>
    </footer>
  </main>

  <script type="module" src="./scripts.js"></script>
</body>
</html>
