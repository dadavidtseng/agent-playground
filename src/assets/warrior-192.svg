<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192" role="img" aria-label="Pixel-art warrior 192px" shape-rendering="crispEdges">
  <title>Warrior (192px)</title>
  <desc>Pixel-art warrior built from aligned rectangles to preserve crisp edges at 192x192. Scaled from 48px design by integer factor 4.</desc>
  <!-- Palette: armor-dark=#3b4b59, armor-light=#8fa0ab, skin=#f2c089, cloak=#b0302a, shield=#8b5a2b, sword=#cfcfcf -->

  <!-- Helmet rim -->
  <rect x="64" y="16" width="64" height="16" fill="#3b4b59" />
  <!-- Head (skin) -->
  <rect x="72" y="32" width="48" height="32" fill="#f2c089" />

  <!-- Body top (light armor) -->
  <rect x="56" y="64" width="80" height="24" fill="#8fa0ab" />
  <!-- Body lower (dark armor) -->
  <rect x="56" y="88" width="80" height="32" fill="#3b4b59" />

  <!-- Cloak (overlay) -->
  <rect x="56" y="88" width="80" height="48" fill="#b0302a" opacity="0.85" />

  <!-- Left arm -->
  <rect x="32" y="72" width="24" height="48" fill="#3b4b59" />
  <!-- Right arm -->
  <rect x="136" y="64" width="24" height="48" fill="#3b4b59" />

  <!-- Shield on left (brown) -->
  <rect x="8" y="80" width="24" height="48" fill="#8b5a2b" />
  <!-- Sword (silver blade) -->
  <rect x="160" y="48" width="16" height="80" fill="#cfcfcf" />
  <!-- Sword hilt -->
  <rect x="152" y="64" width="8" height="16" fill="#3b4b59" />

  <!-- Left leg -->
  <rect x="72" y="120" width="24" height="48" fill="#3b4b59" />
  <!-- Right leg -->
  <rect x="96" y="120" width="24" height="48" fill="#3b4b59" />

  <!-- Boots (darker) -->
  <rect x="72" y="152" width="24" height="16" fill="#1f2a30" />
  <rect x="96" y="152" width="24" height="16" fill="#1f2a30" />
</svg>
