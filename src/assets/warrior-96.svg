<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-label="Pixel-art warrior 96px" shape-rendering="crispEdges">
  <title>Warrior (96px)</title>
  <desc>Pixel-art warrior built from aligned rectangles to preserve crisp edges at 96x96. Scaled from 48px design by integer factor 2.</desc>
  <!-- Palette: armor-dark=#3b4b59, armor-light=#8fa0ab, skin=#f2c089, cloak=#b0302a, shield=#8b5a2b, sword=#cfcfcf -->

  <!-- Helmet rim -->
  <rect x="32" y="8" width="32" height="8" fill="#3b4b59" />
  <!-- Head (skin) -->
  <rect x="36" y="16" width="24" height="16" fill="#f2c089" />

  <!-- Body top (light armor) -->
  <rect x="28" y="32" width="40" height="12" fill="#8fa0ab" />
  <!-- Body lower (dark armor) -->
  <rect x="28" y="44" width="40" height="16" fill="#3b4b59" />

  <!-- Cloak (overlay) -->
  <rect x="28" y="44" width="40" height="24" fill="#b0302a" opacity="0.85" />

  <!-- Left arm -->
  <rect x="16" y="36" width="12" height="24" fill="#3b4b59" />
  <!-- Right arm -->
  <rect x="68" y="32" width="12" height="24" fill="#3b4b59" />

  <!-- Shield on left (brown) -->
  <rect x="4" y="40" width="12" height="24" fill="#8b5a2b" />
  <!-- Sword (silver blade) -->
  <rect x="80" y="24" width="8" height="40" fill="#cfcfcf" />
  <!-- Sword hilt -->
  <rect x="76" y="32" width="4" height="8" fill="#3b4b59" />

  <!-- Left leg -->
  <rect x="36" y="60" width="12" height="24" fill="#3b4b59" />
  <!-- Right leg -->
  <rect x="48" y="60" width="12" height="24" fill="#3b4b59" />

  <!-- Boots (darker) -->
  <rect x="36" y="76" width="12" height="8" fill="#1f2a30" />
  <rect x="48" y="76" width="12" height="8" fill="#1f2a30" />
</svg>
