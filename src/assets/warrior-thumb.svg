  <rect x="34" y="18" width="6" height="16" fill="#111111" />
  <rect x="4" y="22" width="6" height="12" fill="#111111" />
  <rect x="38" y="12" width="4" height="20" fill="#111111" />
  <rect x="18" y="36" width="6" height="8" fill="#111111" />
