<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Pixel-art warrior 48px" shape-rendering="crispEdges">
  <title>Warrior (48px)</title>
  <desc>Pixel-art warrior built from aligned rectangles to preserve crisp edges at 48x48. Palette: armor, skin, cloak, shield, sword.</desc>
  <!-- Palette: armor-dark=#3b4b59, armor-light=#8fa0ab, skin=#f2c089, cloak=#b0302a, shield=#8b5a2b, sword=#cfcfcf -->
  <!-- Scaling: base grid 24x24, scale factor 2 for 48x48 (each logical pixel = 2 units) -->

  <!-- Helmet rim -->
  <rect x="16" y="4" width="16" height="4" fill="#3b4b59" />
  <!-- Head (skin) -->
  <rect x="18" y="8" width="12" height="8" fill="#f2c089" />

  <!-- Body top (light armor) -->
  <rect x="14" y="16" width="20" height="6" fill="#8fa0ab" />
  <!-- Body lower (dark armor) -->
  <rect x="14" y="22" width="20" height="8" fill="#3b4b59" />

  <!-- Cloak (overlay) -->
  <rect x="14" y="22" width="20" height="12" fill="#b0302a" opacity="0.85" />

  <!-- Left arm -->
  <rect x="8" y="18" width="6" height="12" fill="#3b4b59" />
  <!-- Right arm -->
  <rect x="34" y="16" width="6" height="12" fill="#3b4b59" />

  <!-- Shield on left (brown) -->
  <rect x="2" y="20" width="6" height="12" fill="#8b5a2b" />
  <!-- Sword (silver blade) -->
  <rect x="40" y="12" width="4" height="20" fill="#cfcfcf" />
  <!-- Sword hilt -->
  <rect x="38" y="16" width="2" height="4" fill="#3b4b59" />

  <!-- Left leg -->
  <rect x="18" y="30" width="6" height="12" fill="#3b4b59" />
  <!-- Right leg -->
  <rect x="24" y="30" width="6" height="12" fill="#3b4b59" />

  <!-- Boots (darker) -->
  <rect x="18" y="38" width="6" height="4" fill="#1f2a30" />
  <rect x="24" y="38" width="6" height="4" fill="#1f2a30" />
</svg>
