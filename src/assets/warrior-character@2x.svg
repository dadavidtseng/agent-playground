<?xml version="1.0" encoding="UTF-8"?>
<!--
  High-DPI variant: 2x pixel grid (64x64) for better export fidelity on retina displays.
  This file is a direct integer-scale up of the 32x32 source. Keep crispEdges and integer-aligned rects.
  Export settings:
    - viewBox: 0 0 64 64
    - width/height: 256 x 256 recommended for display
    - preserveAspectRatio: xMidYMid meet
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="256" height="256" preserveAspectRatio="xMidYMid meet" aria-label="Pixel-art warrior @2x">
  <g shape-rendering="crispEdges" image-rendering="pixelated">
    <!-- Scaled by 2x from original 32x32 coordinates -->
    <rect x="24" y="4" width="16" height="2" fill="#4B2E1E" />
    <rect x="22" y="6" width="20" height="2" fill="#4B2E1E" />
    <rect x="20" y="8" width="24" height="2" fill="#4B2E1E" />
    <rect x="18" y="10" width="28" height="2" fill="#000000" />
    <rect x="22" y="12" width="6" height="6" fill="#F1C27D" />
    <rect x="36" y="12" width="6" height="6" fill="#F1C27D" />
    <rect x="28" y="14" width="8" height="4" fill="#F1C27D" />
    <rect x="26" y="14" width="2" height="2" fill="#000000" />
    <rect x="38" y="14" width="2" height="2" fill="#000000" />
    <rect x="28" y="18" width="8" height="2" fill="#8FB5C7" />
    <rect x="20" y="20" width="24" height="16" fill="#8FB5C7" />
    <rect x="20" y="30" width="24" height="2" fill="#6B4A2A" />
    <rect x="16" y="20" width="4" height="16" fill="#B33A3A" />
    <rect x="14" y="22" width="2" height="12" fill="#B33A3A" />
    <rect x="18" y="22" width="2" height="10" fill="#8FB5C7" />
    <rect x="42" y="22" width="2" height="10" fill="#8FB5C7" />
    <rect x="10" y="24" width="8" height="12" fill="#8B5A2B" />
    <rect x="12" y="28" width="4" height="4" fill="#000000" />
    <rect x="46" y="22" width="2" height="10" fill="#8FB5C7" />
    <rect x="44" y="26" width="2" height="8" fill="#6B4A2A" />
    <rect x="46" y="22" width="2" height="14" fill="#D9D9D9" />
    <rect x="24" y="36" width="4" height="10" fill="#000000" />
    <rect x="36" y="36" width="4" height="10" fill="#000000" />
    <rect x="24" y="46" width="4" height="2" fill="#6B4A2A" />
    <rect x="36" y="46" width="4" height="2" fill="#6B4A2A" />
    <rect x="26" y="22" width="2" height="2" fill="#D9D9D9" />
    <rect x="36" y="22" width="2" height="2" fill="#D9D9D9" />
    <rect x="28" y="24" width="2" height="2" fill="#000000" />
    <rect x="34" y="24" width="2" height="2" fill="#000000" />
  </g>
  <title>Pixel-art warrior @2x</title>
  <desc>64x64 pixel-grid integer-scale variant of the 32x32 warrior for high-DPI exports.</desc>
</svg>
