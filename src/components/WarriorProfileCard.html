<!-- WarriorProfileCard component
     Location: src/components/WarriorProfileCard.html
     Usage: include this fragment where you need a presentational profile card.
     Styles: src/components/WarriorProfileCard.css
-->
<link rel="stylesheet" href="src/components/WarriorProfileCard.css">

<article class="wpc-card" role="article" aria-labelledby="wpc-name-1" aria-describedby="wpc-bio-1">
  <div class="wpc-media">
    <picture>
      <!-- Primary: optimized SVG with title/desc inside -->
      <source type="image/svg+xml" srcset="/assets/icons/warrior.svg">
      <!-- Fallbacks: PNG 2x and 1x -->
      <source type="image/png" srcset="/assets/icons/warrior@2x.png 2x, /assets/icons/warrior@1x.png 1x">
      <!-- img fallback must include alt text for accessibility -->
      <img src="/assets/icons/warrior@1x.png" alt="Portrait illustration of warrior wearing armor" class="wpc-avatar"/>
    </picture>
  </div>

  <div class="wpc-body">
    <header class="wpc-header">
      <h2 id="wpc-name-1" class="wpc-name">Asha Stormblade</h2>
      <p class="wpc-title">Blade Specialist • Level 27</p>
    </header>

    <section id="wpc-bio-1" class="wpc-bio">
      <p>
        Asha is a seasoned warrior known for swift strikes and tactical acumen. She favors light armor
        and dual blades to maintain mobility on the battlefield.
      </p>
    </section>

    <section class="wpc-stats" aria-label="Warrior statistics">
      <div class="wpc-stat">
        <span class="wpc-stat-value">127</span>
        <span class="wpc-stat-label">HP</span>
      </div>
      <div class="wpc-stat">
        <span class="wpc-stat-value">89</span>
        <span class="wpc-stat-label">Attack</span>
      </div>
      <div class="wpc-stat">
        <span class="wpc-stat-value">72</span>
        <span class="wpc-stat-label">Defense</span>
      </div>
    </section>

    <footer class="wpc-actions">
      <button class="wpc-btn wpc-btn-primary" aria-pressed="false">View Profile</button>
      <button class="wpc-btn" aria-label="Add Asha Stormblade to favorites">☆ Favorite</button>
    </footer>
  </div>
</article>

<!-- Notes:
 - The <picture> element ensures the SVG is used when supported; PNG fallbacks are provided with srcset.
 - Buttons are keyboard-focusable by default and include ARIA attributes for clarity.
 - Keep the CSS file nearby and follow the .wpc- namespace to avoid clashes.
 -->
