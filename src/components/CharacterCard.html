<!-- CharacterCard Component Demo -->
<link rel="stylesheet" href="CharacterCard.css">

<div class="character-card" id="character-card-1" aria-label="Character card">
  <div class="card-header">
    <div class="portrait" aria-hidden="true">
      <!-- Reference to the warrior asset. Adjust path if your project layout differs. -->
      <img src="../../assets/warrior.svg" alt="Portrait of the warrior"/>
    </div>
    <div class="meta">
      <h2 class="name">Thora Brightshield</h2>
      <p class="class">Warrior</p>
    </div>
  </div>

  <div class="card-body">
    <div class="stats" aria-label="Character stats">
      <div class="stat" data-stat="health">
        <div class="stat-label">Health</div>
        <div class="stat-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div class="stat-fill" data-value="85"></div>
        </div>
        <div class="stat-value" aria-hidden="true">85</div>
      </div>

      <div class="stat" data-stat="stamina">
        <div class="stat-label">Stamina</div>
        <div class="stat-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div class="stat-fill" data-value="70"></div>
        </div>
        <div class="stat-value" aria-hidden="true">70</div>
      </div>

      <div class="stat" data-stat="strength">
        <div class="stat-label">Strength</div>
        <div class="stat-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div class="stat-fill" data-value="92"></div>
        </div>
        <div class="stat-value" aria-hidden="true">92</div>
      </div>
    </div>

    <div class="bio">
      <h3>Biography</h3>
      <p>Thora Brightshield is a seasoned frontline warrior, known for her steadfast defense and unbreakable will. She has defended countless villages and earned the respect of allies and foes alike.</p>
    </div>
  </div>

  <div class="card-actions" role="group" aria-label="Character actions">
    <button class="action primary" aria-label="Attack">Attack</button>
    <button class="action" aria-label="Defend">Defend</button>
    <button class="action" aria-label="Use Item">Use Item</button>
  </div>
</div>

<script src="CharacterCard.js" defer></script>
