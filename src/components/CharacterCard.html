<!-- CharacterCard Web Component (standalone) -->
<template id="character-card-template">
  <style>
    :host {
      display: block;
      max-width: 320px;
      font-family: var(--kadi-font-family, Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial);
      color: var(--kadi-color-text, #0f172a);
      background: var(--kadi-surface, #fff);
      border-radius: var(--kadi-radius, 12px);
      box-shadow: 0 6px 18px rgba(12, 22, 40, 0.08);
      overflow: hidden;
      border: 1px solid var(--kadi-border, rgba(2,6,23,0.06));
    }

    .card-inner {
      padding: var(--kadi-space-md, 16px);
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: var(--kadi-space-sm, 12px);
      align-items: center;
    }

    .art {
      width: 96px;
      height: 96px;
      display: block;
    }

    .meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .name {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--kadi-color-primary, #0f172a);
    }

    .class {
      font-size: 0.85rem;
      color: var(--kadi-color-muted, #6b7280);
    }

    .stats {
      margin-top: 8px;
      display: grid;
      gap: 8px;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stat .label {
      width: 56px;
      font-size: 0.85rem;
      color: var(--kadi-color-muted, #6b7280);
    }

    .bar {
      flex: 1;
      height: 10px;
      background: var(--kadi-bar-bg, rgba(2,6,23,0.06));
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .fill {
      height: 100%;
      transform-origin: left center;
      transform: scaleX(0);
      will-change: transform;
      background: linear-gradient(90deg, var(--kadi-accent, #4f46e5), var(--kadi-accent-2, #06b6d4));
      transition: transform 800ms cubic-bezier(.2,.9,.3,1);
      border-radius: 999px;
    }

    /* Different colors per stat via data-stat-name */
    .fill[data-stat="hp"] { background: linear-gradient(90deg,#ef4444,#f97316); }
    .fill[data-stat="str"] { background: linear-gradient(90deg,#f97316,#f59e0b); }
    .fill[data-stat="def"] { background: linear-gradient(90deg,#60a5fa,#3b82f6); }
    .fill[data-stat="spd"] { background: linear-gradient(90deg,#34d399,#10b981); }

    /* Respect reduced motion preference: no animation */
    @media (prefers-reduced-motion: reduce) {
      .fill { transition: none !important; }
    }

    /* Focus styles for keyboard users */
    .stat:focus {
      outline: 3px solid rgba(99,102,241,0.12);
      outline-offset: 3px;
      border-radius: 6px;
    }

  </style>

  <div class="card-inner">
    <div class="art" part="art" aria-hidden="true">
      <!-- Inline warrior SVG artwork (kept simple for demo) -->
      <svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Warrior artwork">
        <rect width="96" height="96" rx="12" fill="var(--kadi-art-bg, #f8fafc)"/>
        <g transform="translate(16,12)">
          <circle cx="32" cy="20" r="12" fill="#111827" opacity="0.9" />
          <rect x="4" y="36" width="56" height="6" rx="3" fill="#374151" />
          <path d="M10 36 L32 10 L54 36" stroke="#111827" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" />
        </g>
      </svg>
    </div>

    <div class="meta">
      <div>
        <div class="name" part="name">Warrior of Kadi</div>
        <div class="class" part="class">Veteran Soldier</div>
      </div>

      <div class="stats" role="group" aria-label="Character stats">
        <div class="stat" role="progressbar" tabindex="0" aria-label="Health" aria-valuemin="0" aria-valuemax="100" aria-valuenow="88" data-value="88">
          <div class="label">HP</div>
          <div class="bar" aria-hidden="true">
            <div class="fill" data-stat="hp"></div>
          </div>
        </div>

        <div class="stat" role="progressbar" tabindex="0" aria-label="Strength" aria-valuemin="0" aria-valuemax="100" aria-valuenow="72" data-value="72">
          <div class="label">STR</div>
          <div class="bar" aria-hidden="true">
            <div class="fill" data-stat="str"></div>
          </div>
        </div>

        <div class="stat" role="progressbar" tabindex="0" aria-label="Defense" aria-valuemin="0" aria-valuemax="100" aria-valuenow="64" data-value="64">
          <div class="label">DEF</div>
          <div class="bar" aria-hidden="true">
            <div class="fill" data-stat="def"></div>
          </div>
        </div>

        <div class="stat" role="progressbar" tabindex="0" aria-label="Speed" aria-valuemin="0" aria-valuemax="100" aria-valuenow="46" data-value="46">
          <div class="label">SPD</div>
          <div class="bar" aria-hidden="true">
            <div class="fill" data-stat="spd"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</template>

<script type="module">
  import './character-card.js';
</script>
