<!-- CharacterCard component
Usage: include this file or its contents in a static preview. The component attempts to import design tokens from docs/design-tokens.css if present; otherwise it falls back to sensible defaults.
-->
<link rel="stylesheet" href="CharacterCard.css">
<div class="character-card" role="group" aria-label="Character card: Warrior" tabindex="0">
  <div class="character-header">
    <div class="svg-container svg-placeholder" aria-hidden="true">
      <!-- Inline placeholder SVG: replace with src/assets/warrior-character.svg when available. -->
      <svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Warrior icon">
        <defs>
          <linearGradient id="g" x1="0" x2="1">
            <stop offset="0%" stop-color="#c84b31" />
            <stop offset="100%" stop-color="#f6a95b" />
          </linearGradient>
        </defs>
        <circle cx="80" cy="48" r="28" fill="#f0d9b5" stroke="#6b4f3e" stroke-width="2" />
        <rect x="36" y="84" width="88" height="56" rx="8" fill="url(#g)" stroke="#6b4f3e" stroke-width="2" />
        <rect x="68" y="100" width="24" height="40" rx="4" fill="#6b4f3e" />
      </svg>
    </div>
    <div class="character-meta">
      <h2 class="character-name">Warrior</h2>
      <div class="character-level">Level <span class="level-value">5</span></div>
    </div>
  </div>

  <div class="character-stats">
    <!-- Each .stat element should have data-stat-name and data-stat-value (0-100). -->
    <div class="stat" data-stat-name="Health" data-stat-value="82">
      <div class="stat-label">Health</div>
      <div class="stat-bar" aria-hidden="false">
        <div class="stat-fill" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
      </div>
      <div class="stat-value">82</div>
    </div>

    <div class="stat" data-stat-name="Attack" data-stat-value="67">
      <div class="stat-label">Attack</div>
      <div class="stat-bar">
        <div class="stat-fill" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
      </div>
      <div class="stat-value">67</div>
    </div>

    <div class="stat" data-stat-name="Defense" data-stat-value="54">
      <div class="stat-label">Defense</div>
      <div class="stat-bar">
        <div class="stat-fill" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
      </div>
      <div class="stat-value">54</div>
    </div>
  </div>

  <script src="CharacterCard.js" defer></script>
</div>
