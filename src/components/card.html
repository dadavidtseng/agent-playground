<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Character Profile Card — Demo</title>
  <link rel="stylesheet" href="../styles/card.css">
</head>
<body>
  <main class="demo">
    <h1 class="sr-only">Character Profile Card Demo</h1>

    <!-- Inline SVG sprite (small sample symbol) -->
    <svg aria-hidden="true" style="display:none">
      <symbol id="icon-avatar" viewBox="0 0 32 32">
        <circle cx="16" cy="12" r="6" />
        <path d="M4 28c0-6.6 5.4-12 12-12s12 5.4 12 12" fill="none" stroke="currentColor" stroke-width="2"/>
      </symbol>
    </svg>

    <section class="cards">
      <article class="card card--compact" tabindex="0" aria-labelledby="char-compact-name">
        <div class="card__header">
          <svg class="card__avatar" aria-hidden="true" width="64" height="64" viewBox="0 0 32 32">
            <use href="#icon-avatar" />
          </svg>
          <div class="card__meta">
            <h2 id="char-compact-name" class="card__name">Ari the Swift</h2>
            <p class="card__role">Rogue</p>
          </div>
        </div>

        <div class="card__stats" data-variant="compact">
          <div class="stat" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" data-stat-percent="85">
            <div class="stat__label">Dexterity</div>
            <div class="stat__track"><div class="stat__fill" aria-hidden="true"></div></div>
          </div>

          <div class="stat" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" data-stat-percent="60">
            <div class="stat__label">Perception</div>
            <div class="stat__track"><div class="stat__fill" aria-hidden="true"></div></div>
          </div>
        </div>
      </article>

      <article class="card card--detailed" tabindex="0" aria-labelledby="char-detailed-name">
        <div class="card__header">
          <svg class="card__avatar" aria-hidden="true" width="96" height="96" viewBox="0 0 32 32">
            <use href="#icon-avatar" />
          </svg>
          <div class="card__meta">
            <h2 id="char-detailed-name" class="card__name">Brynna Oakshield</h2>
            <p class="card__role">Paladin</p>
            <p class="card__tagline">Shield of the Northern Marches</p>
          </div>
        </div>

        <div class="card__body">
          <p class="card__bio">Brynna stands tall, unwavering against the tide of darkness. Her presence bolsters allies and disheartens foes.</p>

          <div class="card__stats" data-variant="detailed">
            <div class="stat" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" data-stat-percent="92">
              <div class="stat__label">Strength</div>
              <div class="stat__track"><div class="stat__fill" aria-hidden="true"></div></div>
            </div>

            <div class="stat" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" data-stat-percent="78">
              <div class="stat__label">Endurance</div>
              <div class="stat__track"><div class="stat__fill" aria-hidden="true"></div></div>
            </div>

            <div class="stat" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" data-stat-percent="64">
              <div class="stat__label">Faith</div>
              <div class="stat__track"><div class="stat__fill" aria-hidden="true"></div></div>
            </div>
          </div>
        </div>
      </article>
    </section>

    <script type="module" src="../scripts/card.js"></script>
  </main>
</body>
</html>
