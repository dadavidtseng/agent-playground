<!-- Character Profile Card Component -->
<div class="character-card" aria-label="Character profile card">
  <header class="cc-header">
    <div class="cc-avatar">
      <img src="assets/monkey.svg" alt="Character avatar" />
    </div>
    <div class="cc-meta">
      <h2 class="cc-name">Mako the Monkey</h2>
      <p class="cc-role">Swashbuckling Explorer</p>
    </div>
  </header>

  <section class="cc-bio">
    <p>
      Quick-witted and curious, Mako swings through ruins in search of
      forgotten trinkets and new friends. Prefers bananas over bureaucracy.
    </p>
  </section>

  <section class="cc-stats" aria-label="Character stats">
    <div class="stat">
      <div class="stat-label">Strength</div>
      <div class="stat-track">
        <div class="stat-bar" role="progressbar" tabindex="0" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" data-value="72"></div>
      </div>
    </div>

    <div class="stat">
      <div class="stat-label">Agility</div>
      <div class="stat-track">
        <div class="stat-bar" role="progressbar" tabindex="0" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" data-value="88"></div>
      </div>
    </div>

    <div class="stat">
      <div class="stat-label">Intellect</div>
      <div class="stat-track">
        <div class="stat-bar" role="progressbar" tabindex="0" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" data-value="63"></div>
      </div>
    </div>
  </section>

  <footer class="cc-actions">
    <button class="btn-primary">View Profile</button>
    <button class="btn-ghost">Message</button>
  </footer>
</div>
