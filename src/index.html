<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Card Component • Demo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <h1>Reusable Character Card (Vanilla)</h1>

    <!-- Example usage of the card component -->
    <section class="card" role="region" aria-label="Character card: Warrior">
      <div class="card-header">
        <!-- Inline SVG should be inlined from assets/character/warrior.svg in the demo folder. -->
        <div class="avatar" aria-hidden="true">
          <!-- Simple inline placeholder avatar for the component demo -->
          <svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="60" cy="60" r="56" fill="var(--color-accent)" />
            <g fill="var(--color-bg)">
              <rect x="38" y="44" width="44" height="8" rx="4"/>
              <rect x="46" y="56" width="28" height="28" rx="6"/>
            </g>
          </svg>
        </div>
        <div class="card-title">
          <h2>Warrior</h2>
          <p class="subtitle">Frontline fighter</p>
        </div>
      </div>

      <div class="card-body">
        <ul class="stats" aria-hidden="false">
          <li class="stat">
            <div class="stat-label">Strength</div>
            <div class="stat-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" data-value="92" aria-valuenow="0">
              <span class="stat-fill" aria-hidden="true"></span>
            </div>
          </li>

          <li class="stat">
            <div class="stat-label">Agility</div>
            <div class="stat-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" data-value="68" aria-valuenow="0">
              <span class="stat-fill" aria-hidden="true"></span>
            </div>
          </li>

          <li class="stat">
            <div class="stat-label">Defense</div>
            <div class="stat-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" data-value="78" aria-valuenow="0">
              <span class="stat-fill" aria-hidden="true"></span>
            </div>
          </li>
        </ul>
      </div>

      <div class="card-footer">
        <button class="btn">View details</button>
      </div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
