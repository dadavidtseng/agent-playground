<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Character Card — Sample</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main id="app" class="container" role="main" aria-labelledby="page-title">
    <h1 id="page-title" class="visually-hidden">Character Card Demo</h1>
    <!-- The character card will be mounted here by scripts.js mountAPI -->
  </main>

  <script type="module">
    import { mountAPI } from './scripts.js';

    // Mount to #app and use default data path (./sample-data.json)
    // This is a tiny example of how the exported API can be used.
    (async () => {
      try {
        await mountAPI('#app');
      } catch (err) {
        // Minimal error handling so page doesn't crash in dev environments
        console.error('mountAPI error:', err);
        const app = document.querySelector('#app');
        if (app) app.innerHTML = '<p class="notice">Failed to load character data. See console for details.</p>';
      }
    })();
  </script>
</body>
</html>
