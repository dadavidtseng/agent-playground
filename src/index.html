<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Character Profile Card - Demo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="demo">
    <h1>Character Profile Card — Demo</h1>
    <p class="lead">Three variants rendered from the same component. Resize the window to see responsive behavior. Click the buttons to update stats dynamically.</p>

    <section class="cards">
      <div class="card-wrap" id="card-warrior"></div>
      <div class="card-wrap" id="card-mage"></div>
      <div class="card-wrap" id="card-rogue"></div>
    </section>

    <section class="controls">
      <button id="randomize">Randomize Stats</button>
    </section>

    <footer>
      <p>Component API: init(container, data) and updateStats(container, newStats). See README for details.</p>
    </footer>
  </main>

  <script src="card.js" type="module"></script>
  <script>
    import { init, updateStats } from './card.js';

    const warriorData = {
      name: 'Asha the Bold',
      variant: 'warrior',
      title: 'Shield of the North',
      avatarLabel: 'Asha portrait',
      stats: { Strength: 88, Agility: 52, Intelligence: 36 }
    };

    const mageData = {
      name: 'Eldin the Arcane',
      variant: 'mage',
      title: 'Keeper of Runes',
      avatarLabel: 'Eldin portrait',
      stats: { Strength: 28, Agility: 44, Intelligence: 96 }
    };

    const rogueData = {
      name: 'Lira Quickhand',
      variant: 'rogue',
      title: 'Night's Whisper',
      avatarLabel: 'Lira portrait',
      stats: { Strength: 46, Agility: 92, Intelligence: 58 }
    };

    const wraps = {
      warrior: document.getElementById('card-warrior'),
      mage: document.getElementById('card-mage'),
      rogue: document.getElementById('card-rogue')
    };

    init(wraps.warrior, warriorData);
    init(wraps.mage, mageData);
    init(wraps.rogue, rogueData);

    document.getElementById('randomize').addEventListener('click', () => {
      const randStats = () => ({
        Strength: Math.floor(Math.random() * 101),
        Agility: Math.floor(Math.random() * 101),
        Intelligence: Math.floor(Math.random() * 101)
      });
      updateStats(wraps.warrior, randStats());
      updateStats(wraps.mage, randStats());
      updateStats(wraps.rogue, randStats());
    });
  </script>
</body>
</html>
