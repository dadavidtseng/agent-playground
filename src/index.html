<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Character Card Demo</title>
  <link rel="stylesheet" href="styles/character-card.css">
</head>
<body>
  <main class="page-wrapper">
    <h1 class="visually-hidden">Character Card Component Demo</h1>

    <!-- Demo container where the JS will insert the skeleton card -->
    <section id="character-demo" class="demo-grid" aria-hidden="true">
      <!-- Cards will be inserted here by scripts/character-card.js -->
    </section>

    <p class="note">Resize the viewport to see responsive layout changes across breakpoints.</p>
  </main>

  <script type="module">
    import { initCharacterCard } from './scripts/character-card.js';

    // Initialize a demo card in the #character-demo container.
    const demoRoot = document.getElementById('character-demo');
    initCharacterCard(demoRoot, {
      // Options are intentionally minimal for this scaffold task.
      name: 'Demo Hero',
      role: 'Placeholder Role'
    });
  </script>
</body>
</html>
