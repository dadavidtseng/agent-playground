<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Stat Card</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <section class="stat-card" data-variant="default" role="group" aria-label="Character statistics">
      <div class="card-head">
        <div class="icon" aria-hidden="true">
          <!-- inline svg inserted by build step - we'll inline from art/stat-icon.svg -->
          <svg id="stat-illustration" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" aria-hidden="true">
            <rect x="8" y="8" width="48" height="48" rx="8" fill="#0b1220"/>
            <g fill="#4fd1c5">
              <rect x="18" y="28" width="4" height="12" rx="2"/>
              <rect x="28" y="20" width="4" height="20" rx="2"/>
              <rect x="38" y="14" width="4" height="26" rx="2"/>
            </g>
          </svg>
        </div>
        <div>
          <h1 class="title">Arcane Ranger</h1>
          <p class="subtitle">Level 12 • Hunter</p>
        </div>
        <div class="variant-toggle">
          <label for="variant-select" class="visually-hidden">Variant</label>
          <select id="variant-select" aria-label="Choose card variant">
            <option value="compact">Compact</option>
            <option value="default" selected>Default</option>
            <option value="expanded">Expanded</option>
          </select>
        </div>
      </div>

      <div class="stats" id="stats" role="list">
        <!-- stat rows inserted by script -->
      </div>
    </section>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
