<!doctype html>
<!--
Implementation note:
- To open locally, open this file in your browser using the file URL (e.g., file:///path/to/index.html).
- To serve with a simple static server, run in this directory:
    python -m http.server 8000
  then visit http://localhost:8000
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Hello World - Centered</title>
  <style>
    /* Make the page fill the viewport and remove default spacing */
    html, body { height: 100%; margin: 0; }

    /* Center content both vertically and horizontally */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0000FF; /* blue background */
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    /* Accessible, readable H1 */
    h1 {
      color: #FFFFFF;
      font-size: 2rem; /* reasonably large and scalable */
      line-height: 1.2;
      margin: 0;
    }
  </style>
</head>
<body>
  <h1>Hello World</h1>
</body>
</html>
