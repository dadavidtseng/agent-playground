<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Card Demo - Stat Bars</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="page">
    <section class="card" aria-label="Character card">
      <div class="card-header">
        <!-- Inline SVG avatar (artist-provided placeholder) -->
        <figure class="avatar" aria-hidden="true">
          <svg viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Avatar illustration">
            <defs>
              <linearGradient id="g1" x1="0" x2="1">
                <stop offset="0" stop-color="var(--accent-1)" />
                <stop offset="1" stop-color="var(--accent-2)" />
              </linearGradient>
            </defs>
            <rect width="120" height="120" rx="20" fill="#f4f7fb" />
            <circle cx="60" cy="44" r="26" fill="url(#g1)" />
            <path d="M32 96c5-14 22-20 28-20s23 6 28 20" fill="#dfe9f7" />
            <circle cx="52" cy="40" r="4" fill="#fff" opacity=".9" />
            <circle cx="68" cy="40" r="4" fill="#fff" opacity=".9" />
            <path d="M50 52c4 4 16 4 20 0" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none" opacity=".9" />
          </svg>
        </figure>
        <div class="meta">
          <h1 class="name">Kaida Sun</h1>
          <p class="sub">Explorer · Synth-archaeologist</p>
        </div>
        <div class="actions">
          <button id="likeBtn" class="btn" aria-pressed="false" aria-label="Like character">❤ Like</button>
          <button id="detailsBtn" class="btn" aria-label="Open details">Details</button>
        </div>
      </div>

      <div class="card-body">
        <dl class="stats" aria-label="Character stats">
          <div class="stat">
            <dt>Strength</dt>
            <dd>
              <div class="stat-bar" role="progressbar" aria-label="Strength" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" data-value="76">
                <div class="stat-bar-track">
                  <div class="stat-bar-fill" aria-hidden="true"></div>
                </div>
                <span class="stat-value" aria-hidden="true">0%</span>
              </div>
            </dd>
          </div>

          <div class="stat">
            <dt>Speed</dt>
            <dd>
              <div class="stat-bar" role="progressbar" aria-label="Speed" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" data-value="54">
                <div class="stat-bar-track">
                  <div class="stat-bar-fill" aria-hidden="true"></div>
                </div>
                <span class="stat-value" aria-hidden="true">0%</span>
              </div>
            </dd>
          </div>

          <div class="stat">
            <dt>Intelligence</dt>
            <dd>
              <div class="stat-bar" role="progressbar" aria-label="Intelligence" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" data-value="91">
                <div class="stat-bar-track">
                  <div class="stat-bar-fill high-contrast" aria-hidden="true"></div>
                </div>
                <span class="stat-value" aria-hidden="true">0%</span>
              </div>
            </dd>
          </div>
        </dl>
      </div>

      <div class="card-footer">
        <button id="randomize" class="btn primary" aria-label="Randomize stats">Randomize</button>
        <button id="reset" class="btn" aria-label="Reset stats to default">Reset</button>
      </div>
    </section>
  </main>

  <script src="js/app.js" defer></script>
</body>
</html>
