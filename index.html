<!--
Implementation notes:
- Single-file HTML5 document named index.html
- Uses semantic HTML and inline CSS only (no external assets)
- Centers an <h1> both vertically and horizontally using Flexbox
- Background color: #007BFF, text color: white, responsive sizing

Verification steps:
1. Open index.html in desktop and mobile browsers.
2. Confirm the H1 reads "Hello, World!" and is centered vertically and horizontally.
3. Confirm background is solid blue (#007BFF) and text is white with sufficient contrast.
4. Resize the viewport to ensure the title remains centered and responsive.
5. Inspect network or view source to confirm no external resources are requested.
-->

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hello, World!</title>
  <style>
    /* Full-height layout and reset */
    html, body {
      height: 100%;
      margin: 0;
    }

    /* Center content both vertically and horizontally */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #007BFF; /* Solid blue background */
      color: #ffffff; /* White text for contrast */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      padding: 1rem; /* small padding for very small viewports */
    }

    h1 {
      margin: 0;
      font-weight: 600;
      /* Responsive font size: scales with viewport but stays within readable bounds */
      font-size: clamp(1.5rem, 5vw, 3rem);
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Hello, World!</h1>
</body>
</html>
