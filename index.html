<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Character Card — Demo</title>
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="cc-container" style="background:var(--cc-color-background);">
  <main>
    <section class="cc-card cc-card--profile" aria-labelledby="card-title" tabindex="0">
      <header class="cc-card__header" style="display:flex;gap:var(--cc-space-3);align-items:center;">
        <div class="cc-card__avatar" aria-hidden="false">
          <!-- inline SVG inserted here -->
          <?xml version="1.0" encoding="UTF-8"?>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="avatar-title">
            <title id="avatar-title">Pixel Cat avatar</title>
            <rect x="4" y="8" width="12" height="8" fill="#6B3E1B" />
            <rect x="44" y="8" width="12" height="8" fill="#6B3E1B" />
            <rect x="12" y="12" width="4" height="4" fill="#F7A6B0" />
            <rect x="48" y="12" width="4" height="4" fill="#F7A6B0" />
            <rect x="12" y="12" width="40" height="44" fill="#6B3E1B" />
            <rect x="16" y="16" width="32" height="36" fill="#F5D6B4" />
            <rect x="20" y="24" width="8" height="8" fill="#FFFFFF" />
            <rect x="36" y="24" width="8" height="8" fill="#FFFFFF" />
            <rect x="24" y="28" width="4" height="4" fill="#000000" />
            <rect x="36" y="28" width="4" height="4" fill="#000000" />
            <rect x="28" y="36" width="8" height="4" fill="#FF6B6B" />
            <rect x="30" y="40" width="4" height="2" fill="#6B3E1B" />
            <rect x="18" y="36" width="4" height="3" fill="#F7A6B0" />
            <rect x="42" y="36" width="4" height="3" fill="#F7A6B0" />
          </svg>
        </div>
        <div>
          <h1 id="card-title" class="cc-card__title">Mochi</h1>
          <p class="cc-text-muted">Level 12 • Pixel Cat</p>
        </div>
      </header>

      <div class="cc-card__body" style="margin-top:var(--cc-space-3);">
        <p class="cc-text">A curious cat who loves yarn and naps. Stats update with a smooth animation on load.</p>

        <ul class="cc-stats" role="list" aria-label="Character stats" style="list-style:none;padding:0;margin:var(--cc-space-2) 0 0 0;display:grid;gap:var(--cc-space-2);">
          <li class="cc-stats__item">
            <div class="cc-stats__label">Health <span class="cc-text-muted">(HP)</span></div>
            <div class="cc-progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" data-target="84" tabindex="0">
              <div class="cc-progress__bar"></div>
            </div>
          </li>

          <li class="cc-stats__item">
            <div class="cc-stats__label">Stamina</div>
            <div class="cc-progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" data-target="67" tabindex="0">
              <div class="cc-progress__bar"></div>
            </div>
          </li>

          <li class="cc-stats__item">
            <div class="cc-stats__label">Charm</div>
            <div class="cc-progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" data-target="95" tabindex="0">
              <div class="cc-progress__bar"></div>
            </div>
          </li>
        </ul>
      </div>

      <footer class="cc-card__footer" style="margin-top:var(--cc-space-3);display:flex;gap:var(--cc-space-2);">
        <button class="cc-button cc-button--primary" aria-label="Send gift to Mochi">Send Gift</button>
        <button class="cc-button" aria-label="Follow Mochi">Follow</button>
      </footer>
    </section>
  </main>

  <script src="scripts.js"></script>
</body>
</html>
