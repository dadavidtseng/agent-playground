<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Character Profile Card</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <section class="character-card" id="warrior-card" tabindex="0" role="region" aria-labelledby="char-name" data-stats='{"hp":86,"attack":72,"defense":65,"speed":48}'>
      <div class="card-media">
        <img src="assets/warrior.svg" alt="Warrior illustration" class="avatar">
      </div>
      <div class="card-body">
        <div class="header">
          <h2 id="char-name">Elysian Warrior</h2>
          <p class="sub">Level 12 • Human</p>
        </div>

        <p class="bio">A seasoned fighter from the Elysian fields. Swift, resilient, and disciplined — a reliable ally in any skirmish.</p>

        <div class="stats" aria-label="Character stats">
          <ul class="stat-list">
            <li class="stat" data-stat="HP" data-value="86" role="progressbar" aria-label="Health points" aria-valuemin="0" aria-valuemax="100" aria-valuenow="86" tabindex="0">
              <div class="stat-meta">
                <span class="stat-name">HP</span>
                <span class="stat-value">86</span>
              </div>
              <div class="stat-track">
                <div class="stat-bar" style="width:0%"></div>
              </div>
            </li>

            <li class="stat" data-stat="Attack" data-value="72" role="progressbar" aria-label="Attack" aria-valuemin="0" aria-valuemax="100" aria-valuenow="72" tabindex="0">
              <div class="stat-meta">
                <span class="stat-name">Attack</span>
                <span class="stat-value">72</span>
              </div>
              <div class="stat-track">
                <div class="stat-bar" style="width:0%"></div>
              </div>
            </li>

            <li class="stat" data-stat="Defense" data-value="65" role="progressbar" aria-label="Defense" aria-valuemin="0" aria-valuemax="100" aria-valuenow="65" tabindex="0">
              <div class="stat-meta">
                <span class="stat-name">Defense</span>
                <span class="stat-value">65</span>
              </div>
              <div class="stat-track">
                <div class="stat-bar" style="width:0%"></div>
              </div>
            </li>

            <li class="stat" data-stat="Speed" data-value="48" role="progressbar" aria-label="Speed" aria-valuemin="0" aria-valuemax="100" aria-valuenow="48" tabindex="0">
              <div class="stat-meta">
                <span class="stat-name">Speed</span>
                <span class="stat-value">48</span>
              </div>
              <div class="stat-track">
                <div class="stat-bar" style="width:0%"></div>
              </div>
            </li>
          </ul>
        </div>

        <div class="controls">
          <button id="randomize" class="btn">Randomize Stats</button>
        </div>

      </div>

      <div id="stat-live" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    </section>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
