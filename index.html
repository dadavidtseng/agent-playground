<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Character Profile Card — Demo</title>
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/card.css">
</head>
<body>
  <main class="demo-grid">
    <h1>Character Profile Card — Demo</h1>

    <section class="breakpoint-demo">
      <h2>Mobile (320px)</h2>
      <div class="bp-frame bp-mobile">
        <div id="card-mobile"></div>
      </div>
    </section>

    <section class="breakpoint-demo">
      <h2>Tablet (768px)</h2>
      <div class="bp-frame bp-tablet">
        <div id="card-tablet"></div>
      </div>
    </section>

    <section class="breakpoint-demo">
      <h2>Desktop (1280px)</h2>
      <div class="bp-frame bp-desktop">
        <div id="card-desktop"></div>
      </div>
    </section>

    <p class="note">Tip: Use keyboard to toggle the bio (Tab → Enter/Space). Hover a stat bar to see the hover animation. If you have prefers-reduced-motion enabled, animations are disabled.</p>
  </main>

  <script type="module" src="scripts/components/card.js"></script>
  <script type="module">
    import { Card } from './scripts/components/card.js';

    const sample = {
      name: 'Aela Windrider',
      title: 'Storm Ranger',
      avatar: `<!-- placeholder SVG avatar -->
        <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="g" x1="0" x2="1">
              <stop offset="0" stop-color="var(--accent-1)" />
              <stop offset="1" stop-color="var(--accent-2)" />
            </linearGradient>
          </defs>
          <circle cx="60" cy="40" r="28" fill="url(#g)" />
          <rect x="20" y="70" width="80" height="30" rx="6" fill="var(--surface)" stroke="var(--muted)"/>
          <text x="60" y="44" font-size="16" text-anchor="middle" fill="white" font-family="sans-serif">AW</text>
        </svg>`,
      bio: `Aela is a ranger from the northern coasts. She excels at hit-and-run tactics and uses the weather to her advantage. Known for her calm demeanor and precision strikes.`,
      stats: {
        hp: 84,
        atk: 72,
        def: 60,
        spd: 95
      }
    };

    // Initialize three cards for the three breakpoints
    Card.init(document.getElementById('card-mobile'), sample);
    Card.init(document.getElementById('card-tablet'), sample);
    Card.init(document.getElementById('card-desktop'), sample);
  </script>
</body>
</html>
