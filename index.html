<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hello World - Centered</title>
  <style>
    /* Minimal, semantic styling to center content and ensure responsiveness */
    html, body {
      height: 100%;
    }
    body {
      display: flex;
      min-height: 100vh;
      margin: 0;
      align-items: center;
      justify-content: center;
      background-color: #0000FF; /* solid blue */
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }
    h1 {
      color: #FFFFFF; /* white text with sufficient contrast against blue */
      font-size: clamp(1.5rem, 5vw, 4rem);
      line-height: 1.1;
      margin: 0;
    }
  </style>
</head>
<body>
  <main>
    <h1>Hello World</h1>
  </main>
</body>
</html>
