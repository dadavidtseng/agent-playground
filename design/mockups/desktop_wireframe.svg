<?xml version="1.0" encoding="UTF-8"?>
<!-- Desktop wireframe (≥1025px)
     Focus: large canvas, spacing system (columns), hover/focus/active states
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <style>
    .bg{fill:#fff}
    .card{fill:#f6f6f6;stroke:#bdbdbd}
    .stroke{stroke:#bdbdbd;fill:none}
    .text{fill:#222;font-family:Inter, Helvetica, sans-serif;font-size:14px}
    .annot{fill:#222;font-family:Inter, Helvetica, sans-serif;font-size:12px}
    .muted{fill:#666;font-size:12px}
    .btn{fill:#e9eefc;stroke:#bdbdf0}
    .btn-hover{fill:#e0e7ff}
    .focus-ring{fill:none;stroke:#ff9800;stroke-width:2;stroke-dasharray:4 2}
    .ghost{fill:none;stroke:#bdbdbd;stroke-dasharray:4 4}
  </style>
  <rect class="bg" width="1440" height="900"/>

  <!-- Global header -->
  <rect class="card" x="0" y="0" width="1440" height="84"/>
  <text class="text" x="24" y="50">App — Desktop (1440×900)</text>

  <!-- 12-column grid annotation -->
  <g transform="translate(24,120)">
    <text class="annot" x="0" y="0">12-column grid — gutter: --space-5 (24px)</text>
    <!-- Visual columns -->
    <g class="ghost">
      <!-- 12 columns of equal width inside 1392px (1440 - 48) -->
      <!-- Draw 12 vertical lines to imply columns -->
      <rect x="0" y="12" width="1392" height="240" rx="8"/>
      <!-- Column guide lines -->
      <!-- We'll draw grid lines every 116px ~ (1392 / 12 = 116) -->
      <!-- Using 12 thinner rects to show columns -->
      <!-- Not exact pixel-perfect; for illustration only -->
    </g>
  </g>

  <!-- Main content (3 columns layout) -->
  <g transform="translate(24,220)">
    <rect class="card" x="0" y="0" width="960" height="420" rx="8"/>
    <rect class="card" x="984" y="0" width="336" height="420" rx="8"/>

    <!-- Content area spacing annotation -->
    <line x1="960" y1="0" x2="960" y2="420" stroke="#ff9800" stroke-dasharray="3 2"/>
    <text class="muted" x="420" y="-8">main: 960px — sidebar: 336px — gap: --space-6 (32px)</text>

    <!-- Interactive table with hover row -->
    <text class="annot" x="16" y="46">Data table — row hover/selected</text>
    <g transform="translate(16,64)">
      <rect class="stroke" x="0" y="0" width="928" height="48" rx="6"/>
      <rect class="btn-hover" x="0" y="64" width="928" height="48" rx="6"/>
      <rect class="accent" x="0" y="128" width="928" height="48" rx="6"/>
      <text class="text" x="12" y="32">Row — default</text>
      <text class="text" x="12" y="96">Row — hover</text>
      <text class="bg" x="12" y="160">Row — selected (accent)</text>
    </g>
  </g>

  <!-- Toolbar with focus and active examples -->
  <g transform="translate(24,660)">
    <text class="annot" x="0" y="0">Toolbar — focus & active</text>
    <g transform="translate(0,16)">
      <rect class="btn" x="0" y="20" width="120" height="44" rx="8" />
      <rect class="focus-ring" x="-6" y="12" width="132" height="60" rx="12"/>
      <text class="text" x="60" y="50" text-anchor="middle">Focus</text>

      <g transform="translate(160,0)">
        <rect class="accent" x="0" y="20" width="120" height="44" rx="8" />
        <text class="bg" x="60" y="50" text-anchor="middle">Active</text>
      </g>
    </g>
  </g>

  <!-- Motion specs -->
  <text class="annot" x="1024" y="660">Motion</text>
  <text class="muted" x="1024" y="682">complex transitions: var(--motion-slow) 320ms</text>
  <text class="muted" x="1024" y="698">micro: var(--motion-fast) 120ms</text>

  <!-- Breakpoint label -->
  <text class="muted" x="1320" y="50">breakpoint: desktop ≥1025px</text>
</svg>