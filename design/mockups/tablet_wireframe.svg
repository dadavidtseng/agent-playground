<?xml version="1.0" encoding="UTF-8"?>
<!-- Tablet wireframe (481–1024px)
     Focus: grid layout, spacing, and interaction states
-->
<svg xmlns="http://www.w3.org/2000/svg" width="768" height="1024" viewBox="0 0 768 1024">
  <style>
    .bg{fill:#fff}
    .card{fill:#f6f6f6;stroke:#bdbdbd}
    .stroke{stroke:#bdbdbd;fill:none}
    .text{fill:#222;font-family:Inter, Helvetica, sans-serif;font-size:13px}
    .annot{fill:#222;font-family:Inter, Helvetica, sans-serif;font-size:12px}
    .muted{fill:#666;font-size:11px}
    .btn{fill:#e9eefc;stroke:#bdbdf0}
    .btn-hover{fill:#e0e7ff}
    .focus-ring{fill:none;stroke:#ff9800;stroke-width:2;stroke-dasharray:4 2}
  </style>
  <rect class="bg" width="768" height="1024"/>

  <!-- Top nav -->
  <rect class="card" x="0" y="0" width="768" height="72"/>
  <text class="text" x="24" y="44">App — Tablet (768×1024)</text>

  <!-- Two-column content grid -->
  <text class="annot" x="24" y="96">Content grid — 2 columns</text>
  <g transform="translate(24,110)">
    <rect class="card" x="0" y="0" width="480" height="240" rx="8"/>
    <rect class="card" x="500" y="0" width="244" height="240" rx="8"/>

    <!-- Column spacing annotation -->
    <line x1="488" y1="0" x2="488" y2="240" stroke="#ff9800" stroke-dasharray="3 2"/>
    <text class="muted" x="350" y="-6">gutter: --space-6 (32px)</text>
  </g>

  <!-- Buttons row -->
  <g transform="translate(24,370)">
    <text class="annot" x="0" y="0">Buttons — size variants + states</text>
    <g transform="translate(0,16)">
      <rect class="btn" x="0" y="20" width="120" height="48" rx="8" />
      <text class="text" x="60" y="52" text-anchor="middle">Primary</text>

      <g transform="translate(140,0)">
        <rect class="btn-hover" x="0" y="20" width="120" height="48" rx="8" />
        <text class="text" x="60" y="52" text-anchor="middle">Hover</text>
      </g>

      <g transform="translate(280,0)">
        <rect class="btn" x="0" y="20" width="120" height="48" rx="8" />
        <rect class="focus-ring" x="-6" y="12" width="132" height="64" rx="12"/>
        <text class="text" x="60" y="52" text-anchor="middle">Focus</text>
      </g>
    </g>
  </g>

  <!-- Form layout: label + input + helper -->
  <g transform="translate(24,460)">
    <text class="annot" x="0" y="0">Form row — spacing</text>
    <text class="muted" x="0" y="18">label — input — helper (inline on tablet)</text>
    <rect class="card" x="0" y="32" width="720" height="64" rx="8"/>
    <rect class="stroke" x="16" y="44" width="220" height="16" rx="4"/>
    <rect class="stroke" x="250" y="44" width="440" height="16" rx="4"/>

    <!-- padding annotations -->
    <text class="muted" x="16" y="108">padding: --space-5 (24px)</text>
  </g>

  <!-- Sidebar interaction (hover active) -->
  <g transform="translate(24,560)">
    <text class="annot" x="0" y="0">Sidebar — hover & active</text>
    <rect class="card" x="0" y="16" width="200" height="320" rx="8"/>
    <!-- item default -->
    <rect class="stroke" x="16" y="36" width="168" height="48" rx="6"/>
    <text class="text" x="30" y="64">Default</text>
    <!-- item hover -->
    <rect class="btn-hover" x="16" y="92" width="168" height="48" rx="6"/>
    <text class="text" x="30" y="120">Hover</text>
    <!-- item active -->
    <rect class="accent" x="16" y="148" width="168" height="48" rx="6"/>
    <text class="bg" x="30" y="176">Active</text>
  </g>

  <!-- Breakpoint label -->
  <text class="muted" x="640" y="44">breakpoint: tablet 481–1024px</text>

</svg>